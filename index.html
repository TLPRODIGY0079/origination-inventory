<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D4AF37">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://vercel.com/insights/script.js"></script>

})();

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Origination-Inventory — POS System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F2F2F7;--bg2:#FFF;--bg3:#E5E5EA;--bg4:#F9F9FB;
  --tx:#1C1C1E;--tx2:#636366;--tx3:#AEAEB2;
  --primary-white:#FFFFFF;--accent-gold:#D4AF37;--primary-black:#000000;
  --ac:var(--accent-gold);--ac2:#B8941F;--ac3:rgba(212,175,55,.12);
  --wave-gradient:linear-gradient(45deg,var(--accent-gold),var(--primary-white));
  --gn:#34C759;--gn2:rgba(52,199,89,.12);
  --wn:#FF9500;--wn2:rgba(255,149,0,.12);
  --dn:#FF3B30;--dn2:rgba(255,59,48,.12);
  --bd:#D1D1D6;--sh:0 2px 12px rgba(0,0,0,.06);
  --sh2:0 8px 30px rgba(0,0,0,.1);
  --r:14px;--rs:10px;--rr:20px;
  --sidebar:260px;--header:64px;
}
.dark{
  --bg:#000;--bg2:#1C1C1E;--bg3:#2C2C2E;--bg4:#1C1C1E;
  --tx:#F2F2F7;--tx2:#8E8E93;--tx3:#48484A;
  --ac:var(--accent-gold);--ac2:#B8941F;--ac3:rgba(212,175,55,.18);
  --bd:#38383A;--sh:0 2px 12px rgba(0,0,0,.3);--sh2:0 8px 30px rgba(0,0,0,.5);
  --gn2:rgba(52,199,89,.18);--wn2:rgba(255,149,0,.18);--dn2:rgba(255,59,48,.18);
}
html{font-size:16px}
body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:linear-gradient(rgba(242,242,247,0.95),rgba(242,242,247,0.95)),url('assets/logos/origination-logo.png');background-size:auto,150px;background-position:center,center;background-repeat:no-repeat,repeat;background-attachment:fixed;color:var(--tx);overflow:hidden;height:100vh;width:100vw}
body.dark{background:linear-gradient(rgba(0,0,0,0.95),rgba(0,0,0,0.95)),url('assets/logos/origination-logo.png');background-size:auto,150px;background-position:center,center;background-repeat:no-repeat,repeat;background-attachment:fixed}
input,select,textarea,button{font-family:inherit;font-size:16px}
a{color:var(--ac);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,rgba(26,26,26,0.95) 0%,rgba(45,45,45,0.95) 100%),url('assets/logos/origination-logo.png');background-size:auto,300px;background-position:center,center;background-repeat:no-repeat,repeat;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,transform .5s}
#loginScreen.hidden{opacity:0;pointer-events:none;transform:scale(1.05)}
.login-card{background:var(--bg2);border-radius:24px;padding:48px 40px;width:380px;max-width:90vw;box-shadow:var(--sh2);text-align:center}
.login-logo{width:64px;height:64px;background:var(--ac);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff}
.login-card h1{font-size:22px;font-weight:700;margin-bottom:4px}
.login-card p{color:var(--tx2);font-size:13px;margin-bottom:28px}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:16px;transition:border .2s,box-shadow .2s;outline:none}
.form-input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;outline:none}
.btn-primary{background:var(--ac);color:#fff;width:100%}
.btn-primary:hover{background:var(--ac2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,175,55,.3)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px}
.btn-outline{background:transparent;border:1.5px solid var(--bd);color:var(--tx)}
.btn-outline:hover{border-color:var(--ac);color:var(--ac);background:var(--ac3)}
.btn-success{background:var(--gn);color:#fff}
.btn-success:hover{filter:brightness(1.1)}
.btn-danger{background:var(--dn);color:#fff}
.btn-danger:hover{filter:brightness(1.1)}
.btn-warning{background:var(--wn);color:#fff}
.btn-ghost{background:transparent;color:var(--tx2);padding:8px 12px}
.btn-ghost:hover{background:var(--bg3);color:var(--tx)}
.login-error{color:var(--dn);font-size:13px;margin-top:8px;display:none}

#appShell{display:none;height:100vh;width:100vw}
#appShell.active{display:flex}
.sidebar{width:var(--sidebar);height:100vh;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s;z-index:100}
.sidebar-brand{padding:20px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd)}
.sidebar-brand .icon{width:40px;height:40px;background:var(--ac);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.sidebar-brand h2{font-size:17px;font-weight:700}
.sidebar-brand span{font-size:11px;color:var(--tx2);display:block}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px}
.nav-section{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;padding:16px 12px 6px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--rs);color:var(--tx2);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:2px}
.nav-item:hover{background:var(--bg);color:var(--tx)}
.nav-item.active{background:var(--ac3);color:var(--ac);font-weight:600}
.nav-item i{width:20px;text-align:center;font-size:15px}
.sidebar-user{padding:16px 20px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--ac3);display:flex;align-items:center;justify-content:center;color:var(--ac);font-weight:700;font-size:14px}
.user-info{flex:1;min-width:0}
.user-info .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-info .role{font-size:11px;color:var(--tx2);text-transform:capitalize}
.logout-btn{background:none;border:none;color:var(--tx3);cursor:pointer;padding:8px;border-radius:8px;font-size:16px;transition:all .2s}
.logout-btn:hover{color:var(--dn);background:var(--dn2)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--header);padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:16px}
.menu-toggle{display:none;background:none;border:none;font-size:20px;color:var(--tx);cursor:pointer;padding:8px}
.topbar h1{font-size:20px;font-weight:700}
.topbar-actions{display:flex;align-items:center;gap:10px}
.content{flex:1;overflow-y:auto;padding:24px 28px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border-radius:var(--r);padding:20px;box-shadow:var(--sh);transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
.stat-icon.blue{background:var(--ac3);color:var(--ac)}
.stat-icon.green{background:var(--gn2);color:var(--gn)}
.stat-icon.orange{background:var(--wn2);color:var(--wn)}
.stat-icon.red{background:var(--dn2);color:var(--dn)}
.stat-value{font-size:26px;font-weight:800;line-height:1.2}
.stat-label{font-size:12px;color:var(--tx2);margin-top:4px;font-weight:500}

.card{background:var(--bg2);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:20px}
.card-header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.card-header h3{font-size:16px;font-weight:700}
.card-body{padding:22px}
.card-body.np{padding:0}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:12px 16px;font-weight:600;color:var(--tx2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);background:var(--bg4);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-blue{background:var(--ac3);color:var(--ac)}
.badge-green{background:var(--gn2);color:var(--gn)}
.badge-orange{background:var(--wn2);color:var(--wn)}
.badge-red{background:var(--dn2);color:var(--dn)}
.badge-gray{background:var(--bg3);color:var(--tx2)}

.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:10px 16px 10px 40px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:15px;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--ac)}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:14px}
.filter-select{padding:10px 16px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:14px;outline:none;cursor:pointer}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border-radius:20px;width:560px;max-width:92vw;max-height:85vh;display:flex;flex-direction:column;transform:scale(.95) translateY(10px);transition:transform .25s;box-shadow:var(--sh2)}
.modal-overlay.active .modal{transform:scale(1) translateY(0)}
.modal-header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.modal-header h3{font-size:17px;font-weight:700}
.modal-close{background:var(--bg3);border:none;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:14px;transition:all .2s}
.modal-close:hover{background:var(--dn2);color:var(--dn)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group.full{grid-column:1/-1}

.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:var(--rs);font-size:13px;font-weight:500;color:#fff;transform:translateX(120%);transition:transform .3s;display:flex;align-items:center;gap:10px;box-shadow:var(--sh2)}
.toast.show{transform:translateX(0)}
.toast-success{background:#34C759}
.toast-error{background:#FF3B30}
.toast-info{background:var(--accent-gold)}

.pos-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;height:calc(100vh - var(--header) - 48px)}
.pos-products{overflow-y:auto}
.pos-cart{background:var(--bg2);border-radius:var(--r);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden}
.cart-header{padding:18px 20px;border-bottom:1px solid var(--bd);font-weight:700;font-size:16px;display:flex;justify-content:space-between;align-items:center}
.cart-items{flex:1;overflow-y:auto;padding:12px}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:var(--rs);margin-bottom:8px}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-variant{font-size:11px;color:var(--tx2)}
.cart-item-price{font-weight:700;font-size:14px;white-space:nowrap}
.cart-item-remove{background:none;border:none;color:var(--tx3);cursor:pointer;padding:4px;font-size:14px;transition:color .2s}
.cart-item-remove:hover{color:var(--dn)}
.cart-footer{padding:16px 20px;border-top:1px solid var(--bd)}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cart-total.grand{font-size:20px;font-weight:800;margin-top:8px;padding-top:10px;border-top:2px solid var(--bd)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.product-tile{background:var(--bg2);border-radius:var(--r);padding:16px;box-shadow:var(--sh);cursor:pointer;transition:all .2s;border:2px solid transparent}
.product-tile:hover{border-color:var(--ac);transform:translateY(-2px)}
.product-tile .cat{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.product-tile .name{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-tile .brand{font-size:12px;color:var(--tx2);margin-bottom:10px}
.product-tile .price{font-size:16px;font-weight:800;color:var(--ac)}
.product-tile .stock{font-size:11px;color:var(--tx3);margin-top:4px}

.receipt{background:#fff;color:#000;padding:30px;max-width:350px;margin:0 auto;font-family:'Courier New',monospace;font-size:12px}
.receipt-center{text-align:center}
.receipt hr{border:none;border-top:1px dashed #999;margin:10px 0}
.receipt-row{display:flex;justify-content:space-between;padding:2px 0}

.empty-state{text-align:center;padding:60px 20px;color:var(--tx2)}
.empty-state i{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--tx)}
.empty-state p{font-size:13px}

.qty-control{display:flex;align-items:center;gap:0;border:1.5px solid var(--bd);border-radius:8px;overflow:hidden}
.qty-btn{background:var(--bg);border:none;width:30px;height:30px;cursor:pointer;font-size:14px;color:var(--tx);display:flex;align-items:center;justify-content:center;transition:background .2s}
.qty-btn:hover{background:var(--bd)}
.qty-val{width:36px;text-align:center;font-size:13px;font-weight:600;background:transparent;border:none;border-left:1px solid var(--bd);border-right:1px solid var(--bd);color:var(--tx)}

.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--bd);padding-bottom:0}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}
  .sidebar-backdrop.active{display:block}
  .menu-toggle{display:block}
  .content{padding:16px}
  .topbar{padding:0 16px}
  .pos-layout{grid-template-columns:1fr;height:auto}
  .pos-cart{max-height:50vh}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
  .product-grid{grid-template-columns:repeat(2,1fr)}
  .btn-primary,.btn-success{width:100%;min-height:48px}
  #lowStockBanner{margin:8px 16px 0}
  #stickyCheckoutBar{display:flex}
  .dash-charts{grid-template-columns:1fr !important}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .login-card{padding:32px 24px}
}
#stickyCheckoutBar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bd);padding:12px 16px;align-items:center;justify-content:space-between;gap:12px;z-index:200;box-shadow:0 -4px 16px rgba(0,0,0,.1)}
#stickyCheckoutBar .sticky-total{font-size:18px;font-weight:800}
#stickyCheckoutBar .sticky-total span{font-size:12px;color:var(--tx2);font-weight:500;display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease}
.clickable{cursor:pointer;user-select:none}

/* Wave Form Design Elements */
@keyframes waveFlow{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.wave-divider{height:3px;background:linear-gradient(90deg,transparent,var(--accent-gold),transparent);position:relative;overflow:hidden}
.wave-divider::before{content:'';position:absolute;top:0;left:0;right:0;height:100%;background:repeating-linear-gradient(90deg,var(--accent-gold) 0px,transparent 10px,transparent 20px,var(--accent-gold) 30px);animation:waveFlow 2s linear infinite}
.wave-border{border:2px solid transparent;background:linear-gradient(var(--bg2),var(--bg2)) padding-box,linear-gradient(45deg,var(--accent-gold),var(--primary-white),var(--accent-gold)) border-box;border-radius:var(--r)}
.wave-accent-border{border-bottom:3px solid var(--accent-gold);position:relative}
.wave-accent-border::after{content:'';position:absolute;bottom:-3px;left:0;width:60px;height:3px;background:var(--accent-gold);filter:blur(4px)}
.wave-btn{position:relative;overflow:hidden}
.wave-btn::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(212,175,55,.3);transform:translate(-50%,-50%);transition:width .6s,height .6s}
.wave-btn:hover::before{width:300px;height:300px}
.wave-loading{display:inline-block;width:40px;height:40px;position:relative}
.wave-loading::after{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:4px solid var(--accent-gold);border-color:var(--accent-gold) transparent var(--accent-gold) transparent;animation:waveRotate 1.2s linear infinite}
@keyframes waveRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.wave-shimmer{background:linear-gradient(90deg,var(--bg2) 0%,var(--accent-gold) 50%,var(--bg2) 100%);background-size:200% 100%;animation:shimmer 2s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.s-wave-pattern{clip-path:path('M0,50 Q25,30 50,50 T100,50 L100,100 L0,100 Z')}

/* Wave Gradient Utility Classes */
.wave-gradient{background:var(--wave-gradient)}
.wave-gradient-border{border:2px solid transparent;background:linear-gradient(var(--bg2),var(--bg2)) padding-box,var(--wave-gradient) border-box}
.wave-gradient-text{background:var(--wave-gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.wave-accent{color:var(--accent-gold)}
.wave-bg{background-color:var(--accent-gold)}
.wave-border{border-color:var(--accent-gold)}

/* Print styles for receipt */
@media print {
  body * {
    visibility: hidden;
  }
  .modal, .modal * {
    visibility: visible;
  }
  .modal {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    background: white;
  }
  .modal-header, .modal-footer {
    display: none;
  }
  .receipt {
    width: 80mm;
    margin: 0 auto;
    font-size: 12px;
  }
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo" style="background:none;padding:0;width:auto;height:auto"><img src="assets/logos/origination-logo.png" alt="Origination" style="width:120px;height:auto"></div>
    <h1>Origination-Inventory</h1>
    <p>Inventory & Point of Sale System</p>
    <div class="form-group">
      <label>Email</label>
      <input class="form-input" id="loginUser" type="email" placeholder="Enter email" autocomplete="email">
    </div>

function applyTheme(theme){
  const root=document.documentElement;
  if(theme==='dark') root.classList.add('dark');
  else if(theme==='light') root.classList.remove('dark');
  else {
    const prefersDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
    prefersDark?root.classList.add('dark'):root.classList.remove('dark');
  }
  localStorage.setItem('storevault_theme',theme);
  updateThemeButton();
}

// ── IndexedDB offline queue ──────────────────────────────────────────────────
const IDB = (() => {
  let _db;
  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((res, rej) => {
      const req = indexedDB.open('origination_inventory_offline', 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('queue')) db.createObjectStore('queue', { keyPath: 'id' });
      };
      req.onsuccess = e => { _db = e.target.result; res(_db); };
      req.onerror = () => rej(req.error);
    });
  }
  async function add(record) { const db = await open(); return new Promise((res,rej)=>{ const tx=db.transaction('queue','readwrite'); tx.objectStore('queue').put(record); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }
  async function getAll() { const db = await open(); return new Promise((res,rej)=>{ const req=db.transaction('queue','readonly').objectStore('queue').getAll(); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }
  async function remove(id) { const db = await open(); return new Promise((res,rej)=>{ const tx=db.transaction('queue','readwrite'); tx.objectStore('queue').delete(id); tx.oncomplete=res; tx.onerror=()=>rej(tx.error); }); }
  return { add, getAll, remove };
})();

// ── Sync offline queue to Supabase ──────────────────────────────────────────
async function syncOfflineQueue() {
  if (!navigator.onLine) return;
  const queue = await IDB.getAll();
  if (!queue.length) return;
  let synced = 0;
  for (const entry of queue) {
    try {
      // idempotency: skip if sale already exists
      const { data: existing } = await supabaseClient.from('sales').select('id').eq('id', entry.sale.id).maybeSingle();
      if (!existing) {
        const { error: saleErr } = await supabaseClient.from('sales').insert([entry.sale]);
        if (saleErr) throw saleErr;
        for (const item of entry.items) {
          await supabaseClient.from('sale_items').insert([item]);
          if (item.serialized && item.serial_id) {
            await supabaseClient.from('serialized_items').update({ status: 'sold' }).eq('id', item.serial_id);
          } else {
            const v = getVariant(item.variant_id);
            if (v) await supabaseClient.from('variants').update({ qty: Math.max(0, (Number(v.qty)||0) - item.qty) }).eq('id', item.variant_id);
          }
          await supabaseClient.from('stock_moves').insert([{ id:uid(), type:'sale', variant_id:item.variant_id, qty:item.qty, ref:entry.sale.id, date:entry.sale.date, user_id:entry.sale.cashier_id, notes:'Sale '+entry.sale.receipt_no }]);
        }
      }
      await IDB.remove(entry.id);
      synced++;
    } catch(e) { console.warn('Sync failed for', entry.id, e); }
  }
  if (synced) {
    DB = await loadDB();
    toast(`${synced} offline sale(s) synced ✓`, 'success');
    if (currentPage === 'dashboard') renderDashboard();
    if (currentPage === 'history')   renderHistory();
  }
}

async function signInWithRealAuth(email,password){
  const{data,error}=await supabaseClient.auth.signInWithPassword({email,password});
  if(error){console.error(error);return{ok:false,error}}
  const{data:userData,error:userError}=await supabaseClient.auth.getUser();
  if(userError||!userData?.user){console.error(userError);return{ok:false,error:userError}}
  const user=userData.user;
  const{data:profile,error:profileError}=await supabaseClient.from('profiles').select('*').eq('id',user.id).single();
  if(profileError||!profile){console.error(profileError);return{ok:false,error:profileError||new Error('Profile not found')}}
  currentUser={id:user.id,username:user.email,name:profile.full_name||user.email.split('@')[0]||'User',role:profile.role||'cashier',plan:profile.plan||'free',onboarding_completed:profile.onboarding_completed??true,active:true,business_id:profile.business_id||null};
  return{ok:true,user:currentUser};
}

// Plan hierarchy: free < pro < enterprise
const PLAN_LEVELS={free:0,pro:1,enterprise:2};
const PAGE_MIN_PLAN={reports:'pro',users:'pro',suppliers:'pro'}; // pages that require a paid plan

function requiresPlan(page){
  const min=PAGE_MIN_PLAN[page];
  if(!min) return true; // no plan restriction
  const userLevel=PLAN_LEVELS[currentUser.plan||'free']??0;
  const reqLevel=PLAN_LEVELS[min]??0;
  return userLevel>=reqLevel;
}

function hasAccess(page){
  if(!currentUser) return false;
  if(!currentUser.onboarding_completed&&page!=='dashboard'){toast('Complete onboarding first','error');return false}
  if(!requiresPlan(page)){showUpgradeModal(PAGE_MIN_PLAN[page]);return false}
  const r=currentUser.role;
  if(r==='admin') return true;
  const access={
    manager:['dashboard','products','inventory','history','reports','suppliers'],
    cashier:['dashboard','sales','history'],
    storekeeper:['dashboard','inventory','products']
  };
  return (access[r]||[]).includes(page);
}

function toast(msg,type='info'){
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  t.innerHTML=`<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'}"></i>${msg}`;
  $('toastContainer').appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));

// ── Role Guard ───────────────────────────────────────────────────────────────
const ROLE_LEVELS={viewer:0,cashier:1,manager:2,admin:3};

function applyRoleGuards(role){
  const level=ROLE_LEVELS[role]??-1;

  // data-role-min: hide element unless user's level >= required level
  document.querySelectorAll('[data-role-min]').forEach(el=>{
    const required=ROLE_LEVELS[el.dataset.roleMin]??0;
    if(level>=required){
      // restore original display if we previously hid it
      if(el.dataset.origDisplay!==undefined){el.style.display=el.dataset.origDisplay;delete el.dataset.origDisplay}
      else if(el.style.display==='none') el.style.display='';
    }else{
      if(el.style.display!=='none'){el.dataset.origDisplay=el.style.display;el.style.display='none'}
    }
  });

  // data-role-allow: hide element unless user's role is in the allowed list
  document.querySelectorAll('[data-role-allow]').forEach(el=>{
    const allowed=el.dataset.roleAllow.split(',').map(r=>r.trim());
    if(allowed.includes(role)){
      if(el.dataset.origDisplay!==undefined){el.style.display=el.dataset.origDisplay;delete el.dataset.origDisplay}
      else if(el.style.display==='none') el.style.display='';
    }else{
      if(el.style.display!=='none'){el.dataset.origDisplay=el.style.display;el.style.display='none'}
    }
  });

  // data-role-write: disable write buttons for viewer (read-only role)
  document.querySelectorAll('[data-role-write]').forEach(el=>{
    el.disabled=level<1; // viewer=0 gets disabled
  });
}

function _getWeekBounds() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const diffToMon = (day === 0 ? -6 : 1 - day);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diffToMon);
  mon.setHours(0,0,0,0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  sun.setHours(23,59,59,999);
  // date strings YYYY-MM-DD
  const monStr = mon.toISOString().slice(0,10);
  const sunStr = sun.toISOString().slice(0,10);
  return { mon, sun, monStr, sunStr };
}

async function getKPIs() {
  const todayStr = today();
  const { monStr, sunStr } = _getWeekBounds();
  const [todayRes, weekRes, stockRes] = await Promise.all([
    supabaseClient.from('sales').select('total_amount').eq('date_str', todayStr),
    supabaseClient.from('sales').select('total_amount').gte('date_str', monStr).lte('date_str', sunStr),
    supabaseClient.from('variants').select('id', { count: 'exact', head: true }).lt('qty', 10)
  ]);

  const todaySales = (todayRes.data || []).reduce((s, r) => s + Number(r.total_amount || 0), 0);
  const weekSales  = (weekRes.data  || []).reduce((s, r) => s + Number(r.total_amount || 0), 0);
  const lowStockCount = stockRes.count || 0;

  return { todaySales, weekSales, lowStockCount };
}

async function getWeeklyRevenue() {
  const { monStr, sunStr } = _getWeekBounds();
  const { data } = await supabaseClient.from('sales').select('date_str, total_amount').gte('date_str', monStr).lte('date_str', sunStr);
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const totals = Array(7).fill(0);
  (data || []).forEach(row => {
    const d = new Date(row.date_str + 'T00:00:00');
    const idx = (d.getDay() + 6) % 7;
    totals[idx] += Number(row.total_amount || 0);
  });
  return days.map((day, i) => ({ day, total: totals[i] }));
}

async function getTopProducts() {

async function deleteSale(saleId){
  if(currentUser.role!=='admin'){toast('Only admin can delete sales','error');return}
  showConfirm('Delete this sale? Stock will be restored.',async()=>{
    try{
      const{data:items}=await supabaseClient.from('sale_items').select('*').eq('sale_id',saleId);
      if(items){
        for(const item of items){
          if(item.serial_id){
            await supabaseClient.from('serialized_items').update({status:'in_stock'}).eq('id',item.serial_id);
          }else{
            const v=getVariant(item.variant_id);
            if(v)await supabaseClient.from('variants').update({qty:(Number(v.qty)||0)+Number(item.qty||0)}).eq('id',item.variant_id);
          }
        }
      }
      const{error:itemsErr}=await supabaseClient.from('sale_items').delete().eq('sale_id',saleId);
      if(itemsErr)throw itemsErr;
      const{error:saleErr}=await supabaseClient.from('sales').delete().eq('id',saleId);
      if(saleErr)throw saleErr;
      DB=await loadDB();
      toast('Sale deleted and stock restored','success');
      renderDashboard();
    }catch(err){console.error(err);toast('Error deleting sale','error')}
  });
}

function addVariantToCart(v){
  const p=getProduct(v.productId);if(!p)return;
  if(p.type==='serialized'){
    const available=DB.serialized.filter(s=>s.variantId===v.id&&s.status==='in_stock'&&!cart.some(ci=>ci.serialId===s.id));
    if(available.length===0){toast('No available units','error');return}
    if(available.length===1){cart.push({id:uid(),variantId:v.id,productName:p.name,variantDesc:variantLabel(v),price:v.price,qty:1,serialized:true,serialId:available[0].id,serialNum:available[0].serial,unit:unitLabel(p)});renderCart();return}
    openModal('Select Unit',`<div style="display:flex;flex-direction:column;gap:8px">${available.map(s=>`<div class="cart-item clickable pick-serial" data-sid="${s.id}" style="cursor:pointer"><div class="cart-item-info"><div class="cart-item-name" style="font-family:monospace">${s.serial}</div><div class="cart-item-variant">${s.imei?'IMEI: '+s.imei:''}</div></div><i class="fas fa-plus" style="color:var(--ac)"></i></div>`).join('')}</div>`,`<button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>`);
    setTimeout(()=>{document.querySelectorAll('.pick-serial').forEach(el=>el.addEventListener('click',()=>{const s=DB.serialized.find(x=>x.id===el.dataset.sid);if(!s)return;cart.push({id:uid(),variantId:v.id,productName:p.name,variantDesc:variantLabel(v),price:v.price,qty:1,serialized:true,serialId:s.id,serialNum:s.serial,unit:unitLabel(p)});closeModal();renderCart()}))},50);
  }else{
    const existing=cart.find(ci=>ci.variantId===v.id&&!ci.serialized);

    else{cart.push({id:uid(),variantId:v.id,productName:p.name,variantDesc:variantLabel(v),price:v.price,qty:1,serialized:false,unit:unitLabel(p)});renderCart()}
  }
}
function renderCart(){

async function completeSale(subtotal){
  let discount=parseFloat($('coDiscount')?$('coDiscount').value:0)||0;
  if(discount<0)discount=0;
  if(discount>subtotal)discount=subtotal;
  const total=subtotal-discount;
  const saleId=uid();
  const receipt=nextReceipt();
  const sale={
    id:saleId,
    receipt_no:receipt,
    cashier_id:currentUser.id,
    cashier_name:currentUser.name,
    customer_name:($('coCustomer')?$('coCustomer').value:'Walk-in Customer').trim()||'Walk-in Customer',
    items:cart.reduce((s,i)=>s+i.qty,0),
    total:total,
    total_amount:total,
    discount,
    payment_method:$('coPayment')?$('coPayment').value:'cash',
    date:new Date().toISOString(),
    date_str:new Date().toISOString().slice(0,10),
    business_id:currentUser.business_id||null
  };
  const saleItems=cart.map(ci=>({id:uid(),sale_id:saleId,variant_id:ci.variantId,product_name:ci.productName,variant_desc:ci.variantDesc,serialized:ci.serialized,serial_id:ci.serialId||null,serial_num:ci.serialNum||null,qty:ci.qty,price:ci.price,discount:0}));

  // ── Optimistic local update so UI reflects sale immediately ─────────────
  const localSale={
    id:saleId,receiptNo:receipt,cashierId:currentUser.id,cashierName:currentUser.name,
    customerName:sale.customer_name,items:sale.items,totalAmount:total,discount,
    paymentMethod:sale.payment_method,date:sale.date,dateStr:sale.date_str
  };
  DB.sales.push(localSale);
  saleItems.forEach(si=>{
    DB.saleItems.push({...si,saleId:si.sale_id,variantId:si.variant_id,productName:si.product_name,variantDesc:si.variant_desc,serialId:si.serial_id,serialNum:si.serial_num,price:Number(si.price)});
    if(si.serialized&&si.serial_id){
      const s=DB.serialized.find(x=>x.id===si.serial_id);if(s)s.status='sold';
    }else{
      const v=getVariant(si.variant_id);if(v)v.qty=Math.max(0,(Number(v.qty)||0)-si.qty);
    }
  });

  cart=[];
  closeModal();
  showReceipt(localSale);
  toast('Sale completed! '+receipt,'success');

  if(!navigator.onLine){
    // ── Save to offline queue ──────────────────────────────────────────────
    await IDB.add({ id:saleId, sale, items:saleItems });
    toast('Saved offline — will sync when connected','info');
    return;
  }

  // ── Online: push to Supabase ─────────────────────────────────────────────
  try{
    const{error:saleError}=await supabaseClient.from('sales').insert([sale]);
    if(saleError)throw saleError;
    for(const si of saleItems){
      await supabaseClient.from('sale_items').insert([si]);
      if(si.serialized&&si.serial_id){
        await supabaseClient.from('serialized_items').update({status:'sold'}).eq('id',si.serial_id);
      }else{
        const v=getVariant(si.variant_id);
        if(v)await supabaseClient.from('variants').update({qty:Math.max(0,(Number(v.qty)||0)-si.qty)}).eq('id',si.variant_id);
      }
      await supabaseClient.from('stock_moves').insert([{id:uid(),type:'sale',variant_id:si.variant_id,qty:si.qty,ref:saleId,date:sale.date,user_id:currentUser.id,notes:'Sale '+receipt}]);
    }
    DB=await loadDB();
    if(currentPage==='dashboard') renderDashboard();
  }catch(err){
    console.error('Online save failed, queuing offline:',err);
    await IDB.add({ id:saleId, sale, items:saleItems });
    toast('Network error — sale queued for sync','info');
  }
}

function exportToExcel(sales) {
  if (!sales || sales.length === 0) { toast('No data to export', 'error'); return; }
  const XLSX = window.XLSX;
  const rows = sales.map(s => ({
    'Receipt No':      s.receipt_no   || s.receiptNo   || '',
    'Date':            s.date_str     || s.dateStr     || '',
    'Cashier':         s.cashier_name || s.cashierName || '',
    'Customer':        s.customer_name|| s.customerName|| '',
    'Items':           s.items        || 0,
    'Total Amount':    Number(s.total_amount || s.totalAmount || 0),
    'Payment Method':  s.payment_method || s.paymentMethod || ''
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sales');
  XLSX.writeFile(wb, `sales-export-${today()}.xlsx`);
}

function exportToPDF(sales) {
  if (!sales || sales.length === 0) { toast('No data to export', 'error'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape' });
  const bizName = (currentUser && currentUser.name) ? currentUser.name : 'Origination-Inventory';
  const exportDate = today();
  const total = sales.reduce((s, r) => s + Number(r.total_amount || r.totalAmount || 0), 0);

  // Header
  doc.setFontSize(16);
  doc.setFont(undefined, 'bold');
  doc.text(bizName, 14, 18);
  doc.setFontSize(10);
  doc.setFont(undefined, 'normal');
  doc.text(`Sales Report — ${exportDate}`, 14, 26);
  doc.text(`Total Sales: K${Number(total).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`, 14, 33);

  // Table header
  const cols = ['Receipt No', 'Date', 'Cashier', 'Customer', 'Items', 'Total Amount', 'Payment'];
  const colWidths = [32, 26, 40, 40, 16, 34, 28];
  let x = 14, y = 44;
  doc.setFillColor(0, 122, 255);
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(9);
  doc.setFont(undefined, 'bold');
  let cx = x;
  cols.forEach((col, i) => {
    doc.rect(cx, y - 5, colWidths[i], 8, 'F');
    doc.text(col, cx + 2, y);
    cx += colWidths[i];
  });

  // Table rows
  doc.setTextColor(0, 0, 0);
  doc.setFont(undefined, 'normal');
  y += 10;
  sales.forEach((s, idx) => {
    if (y > 185) { doc.addPage(); y = 20; }
    if (idx % 2 === 0) { doc.setFillColor(242, 242, 247); let rx = x; colWidths.forEach(w => { doc.rect(rx, y - 5, w, 8, 'F'); rx += w; }); }
    const rowData = [
      s.receipt_no   || s.receiptNo   || '',
      s.date_str     || s.dateStr     || '',
      s.cashier_name || s.cashierName || '',
      s.customer_name|| s.customerName|| '',
      String(s.items || 0),
      'K' + Number(s.total_amount || s.totalAmount || 0).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
      s.payment_method || s.paymentMethod || ''
    ];
    let rx = x;
    rowData.forEach((val, i) => {
      const truncated = String(val).length > 18 ? String(val).slice(0, 16) + '…' : String(val);
      doc.text(truncated, rx + 2, y);
      rx += colWidths[i];
    });
    y += 9;
  });

  doc.save(`sales-report-${today()}.pdf`);
}

  async function refreshStaffTable() {
    const staff = await loadStaffList();
    const tbody = $('staffTableBody');
    if (!tbody) return;
    if (!staff.length) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:30px;color:var(--tx3)">No staff members found</td></tr>`;
      return;
    }
    const roleOptions = ['admin','manager','cashier','viewer'].map(r => `<option value="${r}">${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('');

      <td style="font-weight:600">${s.full_name || '—'}</td>

      <td><select class="filter-select" style="padding:6px 10px;font-size:13px" data-uid="${s.id}" onchange="updateStaffRole(this.dataset.uid,this.value)">${roleOptions.replace(`value="${s.role}"`,`value="${s.role}" selected`)}</select></td>

    </tr>`).join('');
  }

  async function startApp(){
    // Register service worker for offline PWA support
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
    // Handle ?signup=1 from landing page CTA
    if(new URLSearchParams(window.location.search).get('signup')){
      // Show signup after a brief delay so the page renders first
      setTimeout(openSignupModal,400);
    }
    const loaded=await loadDB();
    DB=loaded||DB;
    syncOfflineQueue();
    const restored=await restoreSession();
    if(restored){
      if(['admin','manager'].includes(currentUser.role)) startLowStockMonitor();
      if(!currentUser.onboarding_completed) showOnboarding();
      return;
    }
    $('loginBtn').addEventListener('click',async()=>{
      const email=$('loginUser').value.trim();
      const password=$('loginPass').value.trim();
      const result=await signInWithRealAuth(email,password);
      if(result.ok){
        $('loginScreen').classList.add('hidden');
        $('appShell').classList.add('active');
        renderSidebar();
        navigate('dashboard');
        if(['admin','manager'].includes(currentUser.role)) startLowStockMonitor();
        if(currentUser.role==='admin'||currentUser.role==='manager') startLowStockMonitor();
      }else{
        $('loginError').textContent='Invalid email or password';
        $('loginError').style.display='block';
        setTimeout(()=>{$('loginError').style.display='none'},2500);
      }
    });
    $('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')$('loginBtn').click()});
    $('menuToggle').addEventListener('click',()=>{$('sidebar').classList.add('open');$('sidebarBackdrop').classList.add('active')});
    $('sidebarBackdrop').addEventListener('click',closeSidebar);
  }
  startApp();
