<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D4AF37">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://vercel.com/insights/script.js"></script>
<script src="supabase.js?v=9"></script>
<script>
(async()=>{
  const{data}=await window.supabaseClient.auth.getSession();
  if(!data?.session) window.location.replace('login.html');
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Origination-Inventory — POS System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F2F2F7;--bg2:#FFF;--bg3:#E5E5EA;--bg4:#F9F9FB;
  --tx:#1C1C1E;--tx2:#636366;--tx3:#AEAEB2;
  --primary-white:#FFFFFF;--accent-gold:#D4AF37;--primary-black:#000000;
  --ac:var(--accent-gold);--ac2:#B8941F;--ac3:rgba(212,175,55,.12);
  --wave-gradient:linear-gradient(45deg,var(--accent-gold),var(--primary-white));
  --gn:#34C759;--gn2:rgba(52,199,89,.12);
  --wn:#FF9500;--wn2:rgba(255,149,0,.12);
  --dn:#FF3B30;--dn2:rgba(255,59,48,.12);
  --bd:#D1D1D6;--sh:0 2px 12px rgba(0,0,0,.06);
  --sh2:0 8px 30px rgba(0,0,0,.1);
  --r:14px;--rs:10px;--rr:20px;
  --sidebar:260px;--header:64px;
}
.dark{
  --bg:#000;--bg2:#1C1C1E;--bg3:#2C2C2E;--bg4:#1C1C1E;
  --tx:#F2F2F7;--tx2:#8E8E93;--tx3:#48484A;
  --ac:var(--accent-gold);--ac2:#B8941F;--ac3:rgba(212,175,55,.18);
  --bd:#38383A;--sh:0 2px 12px rgba(0,0,0,.3);--sh2:0 8px 30px rgba(0,0,0,.5);
  --gn2:rgba(52,199,89,.18);--wn2:rgba(255,149,0,.18);--dn2:rgba(255,59,48,.18);
}
html{font-size:16px}
body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:linear-gradient(rgba(242,242,247,0.95),rgba(242,242,247,0.95)),url('assets/logos/origination-logo.png');background-size:auto,150px;background-position:center,center;background-repeat:no-repeat,repeat;background-attachment:fixed;color:var(--tx);overflow:hidden;height:100vh;width:100vw}
body.dark{background:linear-gradient(rgba(0,0,0,0.95),rgba(0,0,0,0.95)),url('assets/logos/origination-logo.png');background-size:auto,150px;background-position:center,center;background-repeat:no-repeat,repeat;background-attachment:fixed}
input,select,textarea,button{font-family:inherit;font-size:16px}
a{color:var(--ac);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,rgba(26,26,26,0.95) 0%,rgba(45,45,45,0.95) 100%),url('assets/logos/origination-logo.png');background-size:auto,300px;background-position:center,center;background-repeat:no-repeat,repeat;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,transform .5s}
#loginScreen.hidden{opacity:0;pointer-events:none;transform:scale(1.05)}
.login-card{background:var(--bg2);border-radius:24px;padding:48px 40px;width:380px;max-width:90vw;box-shadow:var(--sh2);text-align:center}
.login-logo{width:64px;height:64px;background:var(--ac);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff}
.login-card h1{font-size:22px;font-weight:700;margin-bottom:4px}
.login-card p{color:var(--tx2);font-size:13px;margin-bottom:28px}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:16px;transition:border .2s,box-shadow .2s;outline:none}
.form-input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;outline:none}
.btn-primary{background:var(--ac);color:#fff}
.btn-primary:hover{background:var(--ac2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,175,55,.3)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px}
.btn-outline{background:transparent;border:1.5px solid var(--bd);color:var(--tx)}
.btn-outline:hover{border-color:var(--ac);color:var(--ac);background:var(--ac3)}
.btn-success{background:var(--gn);color:#fff}
.btn-success:hover{filter:brightness(1.1)}
.btn-danger{background:var(--dn);color:#fff}
.btn-danger:hover{filter:brightness(1.1)}
.btn-warning{background:var(--wn);color:#fff}
.btn-ghost{background:transparent;color:var(--tx2);padding:8px 12px}
.btn-ghost:hover{background:var(--bg3);color:var(--tx)}
.login-error{color:var(--dn);font-size:13px;margin-top:8px;display:none}

#appShell{display:none;height:100vh;width:100vw}
#appShell.active{display:flex}
.sidebar{width:var(--sidebar);height:100vh;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s;z-index:100}
.sidebar-brand{padding:20px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd)}
.sidebar-brand .icon{width:40px;height:40px;background:var(--ac);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.sidebar-brand h2{font-size:17px;font-weight:700}
.sidebar-brand span{font-size:11px;color:var(--tx2);display:block}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px}
.nav-section{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;padding:16px 12px 6px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--rs);color:var(--tx2);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:2px}
.nav-item:hover{background:var(--bg);color:var(--tx)}
.nav-item.active{background:var(--ac3);color:var(--ac);font-weight:600}
.nav-item i{width:20px;text-align:center;font-size:15px}
.sidebar-user{padding:16px 20px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--ac3);display:flex;align-items:center;justify-content:center;color:var(--ac);font-weight:700;font-size:14px}
.user-info{flex:1;min-width:0}
.user-info .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-info .role{font-size:11px;color:var(--tx2);text-transform:capitalize}
.logout-btn{background:none;border:none;color:var(--tx3);cursor:pointer;padding:8px;border-radius:8px;font-size:16px;transition:all .2s}
.logout-btn:hover{color:var(--dn);background:var(--dn2)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--header);padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:16px}
.menu-toggle{display:none;background:none;border:none;font-size:20px;color:var(--tx);cursor:pointer;padding:8px}
.topbar h1{font-size:20px;font-weight:700}
.topbar-actions{display:flex;align-items:center;gap:10px}
.content{flex:1;overflow-y:auto;padding:24px 28px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border-radius:var(--r);padding:20px;box-shadow:var(--sh);transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
.stat-icon.blue{background:var(--ac3);color:var(--ac)}
.stat-icon.green{background:var(--gn2);color:var(--gn)}
.stat-icon.orange{background:var(--wn2);color:var(--wn)}
.stat-icon.red{background:var(--dn2);color:var(--dn)}
.stat-value{font-size:26px;font-weight:800;line-height:1.2}
.stat-label{font-size:12px;color:var(--tx2);margin-top:4px;font-weight:500}

.card{background:var(--bg2);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:20px}
.card-header{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.card-header h3{font-size:16px;font-weight:700}
.card-body{padding:22px}
.card-body.np{padding:0}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:12px 16px;font-weight:600;color:var(--tx2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);background:var(--bg4);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}

.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-blue{background:var(--ac3);color:var(--ac)}
.badge-green{background:var(--gn2);color:var(--gn)}
.badge-orange{background:var(--wn2);color:var(--wn)}
.badge-red{background:var(--dn2);color:var(--dn)}
.badge-gray{background:var(--bg3);color:var(--tx2)}

.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:10px 16px 10px 40px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:15px;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--ac)}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:14px}
.filter-select{padding:10px 16px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--bg);color:var(--tx);font-size:14px;outline:none;cursor:pointer}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.active{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border-radius:20px;width:580px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column;transform:scale(.95) translateY(10px);transition:transform .25s;box-shadow:var(--sh2)}
.modal-overlay.active .modal{transform:scale(1) translateY(0)}
.modal-header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.modal-header h3{font-size:17px;font-weight:700}
.modal-close{background:var(--bg3);border:none;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:14px;transition:all .2s}
.modal-close:hover{background:var(--dn2);color:var(--dn)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group.full{grid-column:1/-1}

.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:var(--rs);font-size:13px;font-weight:500;color:#fff;transform:translateX(120%);transition:transform .3s;display:flex;align-items:center;gap:10px;box-shadow:var(--sh2);max-width:340px}
.toast.show{transform:translateX(0)}
.toast-success{background:#34C759}
.toast-error{background:#FF3B30}
.toast-info{background:var(--accent-gold)}

.pos-layout{display:grid;grid-template-columns:1fr 380px;gap:20px;height:calc(100vh - var(--header) - 48px)}
.pos-products{overflow-y:auto}
.pos-cart{background:var(--bg2);border-radius:var(--r);box-shadow:var(--sh);display:flex;flex-direction:column;overflow:hidden}
.cart-header{padding:18px 20px;border-bottom:1px solid var(--bd);font-weight:700;font-size:16px;display:flex;justify-content:space-between;align-items:center}
.cart-items{flex:1;overflow-y:auto;padding:12px}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:var(--rs);margin-bottom:8px}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-variant{font-size:11px;color:var(--tx2)}
.cart-item-price{font-weight:700;font-size:14px;white-space:nowrap}
.cart-item-remove{background:none;border:none;color:var(--tx3);cursor:pointer;padding:4px;font-size:14px;transition:color .2s}
.cart-item-remove:hover{color:var(--dn)}
.cart-footer{padding:16px 20px;border-top:1px solid var(--bd)}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cart-total.grand{font-size:20px;font-weight:800;margin-top:8px;padding-top:10px;border-top:2px solid var(--bd)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.product-tile{background:var(--bg2);border-radius:var(--r);padding:16px;box-shadow:var(--sh);cursor:pointer;transition:all .2s;border:2px solid transparent}
.product-tile:hover{border-color:var(--ac);transform:translateY(-2px)}
.product-tile .cat{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.product-tile .name{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-tile .brand{font-size:12px;color:var(--tx2);margin-bottom:10px}
.product-tile .price{font-size:16px;font-weight:800;color:var(--ac)}
.product-tile .stock{font-size:11px;color:var(--tx3);margin-top:4px}

/* Serial number UI */
.serial-list-box{border:1.5px solid var(--bd);border-radius:var(--rs);max-height:180px;overflow-y:auto;margin-bottom:10px}
.serial-list-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--bd);font-size:13px}
.serial-list-item:last-child{border-bottom:none}
.serial-list-item .sn{font-family:monospace;font-weight:600;color:var(--tx)}
.serial-add-row{display:flex;gap:8px;margin-top:8px}
.serial-add-row .form-input{flex:1;font-family:monospace}

/* Serial mode choice in POS */
.serial-choice{display:flex;gap:10px;margin-bottom:16px}
.serial-choice-btn{flex:1;padding:14px 10px;border:2px solid var(--bd);border-radius:var(--rs);text-align:center;cursor:pointer;transition:all .2s;font-size:13px;font-weight:600;color:var(--tx2);background:var(--bg)}
.serial-choice-btn:hover{border-color:var(--ac);color:var(--ac)}
.serial-choice-btn.active{border-color:var(--ac);background:var(--ac3);color:var(--ac)}
.serial-choice-btn i{display:block;font-size:22px;margin-bottom:6px}

.receipt{background:#fff;color:#000;padding:30px;max-width:350px;margin:0 auto;font-family:'Courier New',monospace;font-size:12px}
.receipt-center{text-align:center}
.receipt hr{border:none;border-top:1px dashed #999;margin:10px 0}
.receipt-row{display:flex;justify-content:space-between;padding:2px 0}

.empty-state{text-align:center;padding:60px 20px;color:var(--tx2)}
.empty-state i{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--tx)}
.empty-state p{font-size:13px}

.qty-control{display:flex;align-items:center;gap:0;border:1.5px solid var(--bd);border-radius:8px;overflow:hidden}
.qty-btn{background:var(--bg);border:none;width:30px;height:30px;cursor:pointer;font-size:14px;color:var(--tx);display:flex;align-items:center;justify-content:center;transition:background .2s}
.qty-btn:hover{background:var(--bd)}
.qty-val{width:36px;text-align:center;font-size:13px;font-weight:600;background:transparent;border:none;border-left:1px solid var(--bd);border-right:1px solid var(--bd);color:var(--tx)}

.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--bd);padding-bottom:0}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:var(--tx)}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none}
  .sidebar-backdrop.active{display:block}
  .menu-toggle{display:block}
  .content{padding:16px}
  .topbar{padding:0 16px}
  .pos-layout{grid-template-columns:1fr;height:auto}
  .pos-cart{max-height:50vh}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
  .product-grid{grid-template-columns:repeat(2,1fr)}
  .btn-primary,.btn-success{width:100%;min-height:48px}
  #lowStockBanner{margin:8px 16px 0}
  #stickyCheckoutBar{display:flex}
  .dash-charts{grid-template-columns:1fr !important}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr}.login-card{padding:32px 24px}}
#stickyCheckoutBar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bd);padding:12px 16px;align-items:center;justify-content:space-between;gap:12px;z-index:200;box-shadow:0 -4px 16px rgba(0,0,0,.1)}
#stickyCheckoutBar .sticky-total{font-size:18px;font-weight:800}
#stickyCheckoutBar .sticky-total span{font-size:12px;color:var(--tx2);font-weight:500;display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease}
.clickable{cursor:pointer;user-select:none}

@keyframes waveFlow{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.wave-divider{height:3px;background:linear-gradient(90deg,transparent,var(--accent-gold),transparent);position:relative;overflow:hidden}
.wave-divider::before{content:'';position:absolute;top:0;left:0;right:0;height:100%;background:repeating-linear-gradient(90deg,var(--accent-gold) 0px,transparent 10px,transparent 20px,var(--accent-gold) 30px);animation:waveFlow 2s linear infinite}
.wave-border{border:2px solid transparent;background:linear-gradient(var(--bg2),var(--bg2)) padding-box,linear-gradient(45deg,var(--accent-gold),var(--primary-white),var(--accent-gold)) border-box;border-radius:var(--r)}
.wave-accent{color:var(--accent-gold)}
.wave-bg{background-color:var(--accent-gold)}
.wave-loading{display:inline-block;width:40px;height:40px;position:relative}
.wave-loading::after{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:4px solid var(--accent-gold);border-color:var(--accent-gold) transparent var(--accent-gold) transparent;animation:waveRotate 1.2s linear infinite}
@keyframes waveRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

@media print{body *{visibility:hidden}.modal,.modal *{visibility:visible}.modal{position:absolute;left:0;top:0;width:100%;background:white}.modal-header,.modal-footer{display:none}.receipt{width:80mm;margin:0 auto;font-size:12px}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo" style="background:none;padding:0;width:auto;height:auto"><img src="assets/logos/origination-logo.png" alt="Origination" style="width:120px;height:auto"></div>
    <h1>Origination-Inventory</h1>
    <p>Inventory &amp; Point of Sale System</p>
    <div class="form-group">
      <label>Email</label>
      <input class="form-input" id="loginUser" type="email" placeholder="Enter email" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-input" id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <div class="login-error" id="loginError">Invalid credentials</div>

// ── FIX 1: IDB offline queue — always ensure record.id exists (keyPath) ──────
const IDB=(()=>{
  let _db;
  function open(){
    if(_db)return Promise.resolve(_db);
    return new Promise((res,rej)=>{
      const req=indexedDB.open('origination_inventory_offline',2);
      req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('queue'))db.createObjectStore('queue',{keyPath:'id'})};
      req.onsuccess=e=>{_db=e.target.result;res(_db)};
      req.onerror=()=>rej(req.error);
    });
  }
  // FIXED: guarantee 'id' field before put()
  async function add(record){
    if(!record.id)record.id=Date.now().toString(36)+Math.random().toString(36).slice(2,8);
    const db=await open();
    return new Promise((res,rej)=>{const tx=db.transaction('queue','readwrite');tx.objectStore('queue').put(record);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)});
  }
  async function getAll(){const db=await open();return new Promise((res,rej)=>{const req=db.transaction('queue','readonly').objectStore('queue').getAll();req.onsuccess=()=>res(req.result||[]);req.onerror=()=>rej(req.error)})}
  async function remove(id){const db=await open();return new Promise((res,rej)=>{const tx=db.transaction('queue','readwrite');tx.objectStore('queue').delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}
  return{add,getAll,remove};
})();

async function syncOfflineQueue(){
  if(!navigator.onLine)return;
  let queue=[];
  try{queue=await IDB.getAll()}catch(e){return}
  if(!queue.length)return;
  let synced=0;
  for(const entry of queue){
    try{
      const{data:ex}=await supabaseClient.from('sales').select('id').eq('id',entry.sale.id).maybeSingle();
      if(!ex){
        const{error:sE}=await supabaseClient.from('sales').insert([entry.sale]);
        if(sE)throw sE;
        for(const item of entry.items){
          await supabaseClient.from('sale_items').insert([item]);
          if(item.serialized&&item.serial_id)await supabaseClient.from('serialized_items').update({status:'sold'}).eq('id',item.serial_id);
          else{const v=getVariant(item.variant_id);if(v)await supabaseClient.from('variants').update({qty:Math.max(0,(Number(v.qty)||0)-item.qty)}).eq('id',item.variant_id)}
          await supabaseClient.from('stock_moves').insert([{id:uid(),type:'sale',variant_id:item.variant_id,qty:item.qty,ref:entry.sale.id,date:entry.sale.date,user_id:entry.sale.cashier_id||currentUser.id,notes:'Sale '+entry.sale.receipt_no}]);
        }
      }
      await IDB.remove(entry.id);synced++;
    }catch(e){console.warn('Sync failed',entry.id,e)}
  }
  if(synced){DB=await loadDB();toast(`${synced} offline sale(s) synced ✓`,'success');if(currentPage==='dashboard')renderDashboard();if(currentPage==='history')renderHistory()}
}

async function deleteSale(saleId){
  if(currentUser.role!=='admin'){toast('Only admin can delete sales','error');return}
  showConfirm('Delete this sale? Stock will be restored.',async()=>{
    try{
      const{data:items}=await supabaseClient.from('sale_items').select('*').eq('sale_id',saleId);
      if(items)for(const item of items){if(item.serial_id)await supabaseClient.from('serialized_items').update({status:'in_stock'}).eq('id',item.serial_id);else{const v=getVariant(item.variant_id);if(v)await supabaseClient.from('variants').update({qty:(Number(v.qty)||0)+Number(item.qty||0)}).eq('id',item.variant_id)}}
      await supabaseClient.from('sale_items').delete().eq('sale_id',saleId);
      const{error}=await supabaseClient.from('sales').delete().eq('id',saleId);
      if(error)throw error;
      DB=await loadDB();toast('Sale deleted and stock restored','success');renderDashboard();
    }catch(err){console.error(err);toast('Error deleting sale','error')}
  });
}

function renderProducts(){
  const canEdit=currentUser.role==='admin'||currentUser.role==='manager';
  renderTopbarActions(canEdit?`<button class="btn btn-primary btn-sm" id="addProductBtn" data-role-min="manager" data-role-write="1"><i class="fas fa-plus"></i> Add Product</button>`:'');
  if(canEdit&&$('addProductBtn'))$('addProductBtn').addEventListener('click',()=>openProductModal());
  $('mainContent').innerHTML=`<div class="fade-in"><div class="search-bar"><div class="search-wrap"><i class="fas fa-search"></i><input class="search-input" id="prodSearch" placeholder="Search products..."></div><select class="filter-select" id="prodCatFilter"><option value="">All Categories</option>${DB.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select><select class="filter-select" id="prodBrandFilter"><option value="">All Brands</option>${DB.brands.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select></div><div class="card"><div class="card-body np"><div class="table-wrap"><table><thead><tr><th>Product</th><th>Brand</th><th>Category</th><th>Type</th><th>Unit</th><th>Variants</th><th>Stock</th><th>Cost</th><th>Value</th><th>Price</th><th data-role-min="manager">Actions</th></tr></thead><tbody id="prodTableBody"></tbody></table></div></div></div></div>`;
  renderProductTable();
  $('prodSearch').addEventListener('input',renderProductTable);
  $('prodCatFilter').addEventListener('change',renderProductTable);
  $('prodBrandFilter').addEventListener('change',renderProductTable);
}
function renderProductTable(){
  const q=($('prodSearch')?$('prodSearch').value:'').toLowerCase();
  const catF=$('prodCatFilter')?$('prodCatFilter').value:'';
  const brF=$('prodBrandFilter')?$('prodBrandFilter').value:'';
  const canEdit=currentUser.role==='admin'||currentUser.role==='manager';
  const filtered=DB.products.filter(p=>{if(q&&!p.name.toLowerCase().includes(q)&&!(getBrand(p.brandId)||{name:''}).name.toLowerCase().includes(q))return false;if(catF&&p.catId!==catF)return false;if(brF&&p.brandId!==brF)return false;return true});
  const tbody=$('prodTableBody');if(!tbody)return;
  tbody.innerHTML=filtered.map(p=>{const brand=getBrand(p.brandId);const cat=getCat(p.catId);const variants=getProductVariants(p.id);const stock=getTotalStock(p.id);const cost=Number(p.cost||0);const value=stock*cost;return`<tr class="clickable" data-pid="${p.id}"><td style="font-weight:600">${p.name}</td><td>${brand?brand.name:'—'}</td><td><span class="badge badge-blue">${cat?cat.name:'—'}</span></td><td><span class="badge ${p.type==='serialized'?'badge-orange':'badge-gray'}">${p.type==='serialized'?'Serial/IMEI':'Quantity'}</span></td><td>${unitLabel(p)}</td><td>${variants.length}</td><td><span class="badge ${stock<=0?'badge-red':stock<=(p.reorder||5)?'badge-orange':'badge-green'}">${stock} ${unitLabel(p)}</span></td><td>${money(cost)}</td><td style="font-weight:600">${money(value)}</td><td>${money(p.price)}</td><td data-role-min="manager">${canEdit?`<button class="btn btn-ghost btn-sm edit-prod" data-id="${p.id}" data-role-min="manager" data-role-write="1"><i class="fas fa-pen"></i></button><button class="btn btn-ghost btn-sm del-prod" data-id="${p.id}" style="color:var(--dn)" data-role-min="admin"><i class="fas fa-trash"></i></button>`:''}</td></tr>`}).join('')||`<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--tx3)"><i class="fas fa-box-open" style="font-size:32px;opacity:.3;display:block;margin-bottom:8px"></i>No products found</td></tr>`;
  tbody.querySelectorAll('tr.clickable').forEach(r=>r.addEventListener('click',e=>{if(e.target.closest('.edit-prod')||e.target.closest('.del-prod'))return;openProductDetail(r.dataset.pid)}));
  tbody.querySelectorAll('.edit-prod').forEach(b=>b.addEventListener('click',()=>openProductModal(b.dataset.id)));
  tbody.querySelectorAll('.del-prod').forEach(b=>b.addEventListener('click',()=>showConfirm('Delete this product and all its variants?',async()=>{
    const id=b.dataset.id;const removedVariantIds=DB.variants.filter(v=>v.productId===id).map(v=>v.id);
    try{if(removedVariantIds.length)await supabaseClient.from('serialized_items').delete().in('variant_id',removedVariantIds);await supabaseClient.from('variants').delete().eq('product_id',id);const{error}=await supabaseClient.from('products').delete().eq('id',id);if(error)throw error;DB=await loadDB();renderProducts();toast('Product deleted','success')}catch(err){console.error(err);toast('Failed to delete product','error')}
  })));
  if(currentUser)applyRoleGuards(currentUser.role);
}

      if(brandInput){let ex=DB.brands.find(b=>b.name.toLowerCase()===brandInput.toLowerCase());if(!ex){const nb=uid();const{error:bE}=await supabaseClient.from('brands').insert([{id:nb,name:brandInput,business_id:currentUser.business_id}]);if(bE){toast('Failed to create brand','error');return}brandId=nb;DB.brands.push({id:nb,name:brandInput})}else brandId=ex.id}

      let catId=null;
      if(catInput){let ex=DB.categories.find(c=>c.name.toLowerCase()===catInput.toLowerCase());if(!ex){const nc=uid();const{error:cE}=await supabaseClient.from('categories').insert([{id:nc,name:catInput,icon:'fa-box',business_id:currentUser.business_id}]);if(cE){toast('Failed to create category','error');return}catId=nc;DB.categories.push({id:nc,name:catInput,icon:'fa-box'})}else catId=ex.id}

        const vData={id:vId,product_id:newPId,name:name,sku:name.replace(/\s+/g,'').substring(0,4).toUpperCase()+'-'+uid().slice(0,5).toUpperCase(),attrs:{},price:data.price,cost:data.cost,qty:data.type==='qty'?initStock:0,business_id:currentUser.business_id};
        const{error:vE}=await supabaseClient.from('variants').insert([vData]);
        if(vE){toast('Failed to create variant','error');return}
        if(initStock>0&&data.type==='qty')await supabaseClient.from('stock_moves').insert([{id:uid(),type:'restock',variant_id:vId,qty:initStock,date:now(),user_id:currentUser.id,notes:`Initial stock: +${initStock}`}]);

        if(data.type==='serialized'&&window._pendingSerials.length>0){
          for(const serial of window._pendingSerials){
            const{error:sE}=await supabaseClient.from('serialized_items').insert([{id:uid(),variant_id:vId,serial,status:'in_stock',date_added:now()}]);

          }
        }
      }
      DB=await loadDB();window._pendingSerials=[];closeModal();renderProducts();toast(p?'Product updated':'Product created','success');
    });
  },50);
}

window.onProductTypeChange=function(){
  const t=$('mProdType')?$('mProdType').value:'qty';
  const iw=$('initStockWrap');const sp=$('mSerialPanel');
  if(iw)iw.style.display=t==='serialized'?'none':'';

}
window.pmAddSerial=function(){
  const inp=$('mSerialInput');if(!inp)return;
  const s=inp.value.trim();if(!s){toast('Enter a serial number','error');return}
  if(window._pendingSerials.includes(s)){toast('Already added','error');return}
  if(DB.serialized.find(x=>x.serial===s&&(x.status==='in_stock'||x.status==='available'))){toast('Serial already in inventory','error');return}
  window._pendingSerials.push(s);inp.value='';pmRenderSerials();
}
function pmRenderSerials(){
  const box=$('mSerialListBox');const badge=$('serialCountBadge');
  if(box){
    if(!window._pendingSerials.length){box.style.display='none'}
    else{box.style.display='';box.innerHTML=window._pendingSerials.map((s,i)=>`<div class="serial-list-item"><span class="sn">${s}</span><button class="btn btn-ghost btn-sm" onclick="window._pendingSerials.splice(${i},1);pmRenderSerials()" style="padding:2px 8px;color:var(--dn)"><i class="fas fa-times"></i></button></div>`).join('')}
  }
  if(badge)badge.textContent=`${window._pendingSerials.length} added`;
}

// ── FIX 5 (cont): openStockInModal — proper serial input, no IDB misuse ───────
function openStockInModal(){
  window._stockSerials=[];
  openModal('Stock In',`
    <div class="form-group"><label>Product</label><select class="form-input" id="siProduct"><option value="">Select product...</option>${DB.products.map(p=>`<option value="${p.id}">${p.name} (${p.type==='serialized'?'Serialized':'Qty'})</option>`).join('')}</select></div>
    <div class="form-group"><label>Variant</label><select class="form-input" id="siVariant" disabled><option value="">Select product first...</option></select></div>
    <div id="siFields"></div>
    <div id="siSerialSection" style="display:none;margin-top:4px">
      <div style="padding:14px;background:var(--bg);border-radius:var(--rs);border:1.5px solid var(--bd)">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--ac)"><i class="fas fa-barcode" style="margin-right:6px"></i>Add Serial / IMEI Numbers <span class="badge badge-gray" id="siSerialBadge">0 added</span></div>
        <div id="siSerialListBox" class="serial-list-box" style="display:none"></div>
        <div class="serial-add-row">
          <input class="form-input" id="siSerial" placeholder="Enter serial or IMEI number" style="font-family:monospace">
          <button class="btn btn-success btn-sm" type="button" onclick="siAddSerial()"><i class="fas fa-plus"></i> Add</button>
        </div>
        <div style="font-size:11px;color:var(--tx3);margin-top:6px" id="siSerialHint">Press Enter or click Add after each serial</div>
      </div>
    </div>
  `,`<button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-success btn-sm" id="siSaveBtn"><i class="fas fa-check"></i> Add Stock</button>`);
  setTimeout(()=>{
    $('siProduct').addEventListener('change',()=>{
      const pId=$('siProduct').value;
      const variants=getProductVariants(pId);
      if(!pId){$('siVariant').innerHTML='<option value="">Select product first...</option>';$('siVariant').disabled=true;$('siFields').innerHTML='';$('siSerialSection').style.display='none';return}
      $('siVariant').innerHTML=`<option value="">Select variant...</option>`+variants.map(v=>`<option value="${v.id}">${variantLabel(v)||'Standard'} — ${v.sku||'no sku'}</option>`).join('');
      $('siVariant').disabled=false;$('siFields').innerHTML='';$('siSerialSection').style.display='none';
    });
    $('siVariant').addEventListener('change',()=>{
      const vId=$('siVariant').value;if(!vId)return;
      const v=getVariant(vId);if(!v)return;const p=getProduct(v.productId);if(!p)return;
      window._stockSerials=[];siRenderSerials();
      if(p.type==='serialized'){$('siFields').innerHTML='';$('siSerialSection').style.display=''}
      else{$('siSerialSection').style.display='none';$('siFields').innerHTML=`<div class="form-group"><label>Quantity to Add (${unitLabel(p)})</label><input class="form-input" id="siQty" type="number" min="1" value="1"></div>`}
    });
    const si=$('siSerial');if(si)si.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();siAddSerial()}});
    $('siSaveBtn').addEventListener('click',processAddStock);
  },50);
}
window.siAddSerial=function(){
  const inp=$('siSerial');if(!inp)return;
  const s=inp.value.trim();if(!s){toast('Enter a serial number','error');return}
  if(window._stockSerials.includes(s)){toast('Already in list','error');return}
  if(DB.serialized.find(x=>x.serial===s&&(x.status==='in_stock'||x.status==='available'))){toast('Serial already exists in inventory','error');return}
  window._stockSerials.push(s);inp.value='';siRenderSerials();
}
function siRenderSerials(){
  const box=$('siSerialListBox');const badge=$('siSerialBadge');
  if(box){if(!window._stockSerials.length){box.style.display='none'}else{box.style.display='';box.innerHTML=window._stockSerials.map((s,i)=>`<div class="serial-list-item"><span class="sn">${s}</span><button class="btn btn-ghost btn-sm" onclick="window._stockSerials.splice(${i},1);siRenderSerials()" style="padding:2px 8px;color:var(--dn)" type="button"><i class="fas fa-times"></i></button></div>`).join('')}}
  if(badge)badge.textContent=`${window._stockSerials.length} added`;
}
// FIX 3 (cont): processAddStock — uses Supabase directly, no IDB
async function processAddStock(){
  const vId=$('siVariant')?$('siVariant').value:'';
  if(!vId){toast('Select a variant','error');return}
  const v=getVariant(vId);const p=getProduct(v.productId);
  const btn=$('siSaveBtn');if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Saving...'}
  try{
    if(p.type==='serialized'){
      if(!window._stockSerials||window._stockSerials.length===0){toast('Add at least one serial number','error');if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Add Stock'}return}
      let added=0;
      for(const serial of window._stockSerials){
        const{error}=await supabaseClient.from('serialized_items').insert([{id:uid(),variant_id:vId,serial,status:'in_stock',date_added:now()}]);
        if(error)console.error('Serial insert error:',error);
        else{await supabaseClient.from('stock_moves').insert([{id:uid(),type:'restock',variant_id:vId,qty:1,date:now(),user_id:currentUser.id,notes:'Serial added: '+serial}]);added++}
      }
      window._stockSerials=[];DB=await loadDB();closeModal();
      toast(`${added} serial(s) added to stock`,'success');
      if(currentPage==='products')renderProducts();
    }else{
      const qty=parseFloat($('siQty')?$('siQty').value:0)||0;
      if(qty<=0){toast('Enter valid quantity','error');if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Add Stock'}return}
      const{error}=await supabaseClient.from('variants').update({qty:(Number(v.qty)||0)+qty}).eq('id',vId);
      if(error)throw error;
      await supabaseClient.from('stock_moves').insert([{id:uid(),type:'restock',variant_id:vId,qty,date:now(),user_id:currentUser.id,notes:`Qty stock in: +${qty}`}]);
      DB=await loadDB();closeModal();
      toast(`${qty} ${unitLabel(p)} added to stock`,'success');
      if(currentPage==='products')renderProducts();
    }
  }catch(err){console.error('Error adding stock:',err);toast('Failed to add stock','error');if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-check"></i> Add Stock'}}
}

n Value:</span><span style="font-weight:700;color:var(--gn)" id="tiTradeVal">${money(0)}</span></div><hr style="border:none;border-top:2px solid var(--bd);margin:10px 0"><div style="display:flex;justify-content:space-between"><span style="font-size:16px;font-weight:600">Net Payment:</span><span style="font-size:24px;font-weight:800;color:var(--ac)" id="tiNetPayment">${money(0)}</span></div></div>`,`<button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-success btn-sm" id="processTradeinBtn"><i class="fas fa-check"></i> Process Trade-In</button>`);

function renderSales(){
  if(currentUser.role!=='admin'&&currentUser.role!=='cashier'){$('mainContent').innerHTML=`<div class="empty-state"><i class="fas fa-lock"></i><h3>Access Denied</h3><p>Only cashiers and admins can process sales.</p></div>`;return}
  $('mainContent').innerHTML=`<div class="fade-in pos-layout"><div class="pos-products"><div class="search-bar"><div class="search-wrap"><i class="fas fa-search"></i><input class="search-input" id="posSearch" placeholder="Search products..."></div><select class="filter-select" id="posCatFilter"><option value="">All</option>${DB.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div><div class="product-grid" id="posGrid"></div></div><div class="pos-cart"><div class="cart-header"><span><i class="fas fa-shopping-cart" style="margin-right:8px"></i>Cart</span><span class="badge badge-blue" id="cartCount">0</span></div><div class="cart-items" id="cartItems"><div class="empty-state" style="padding:30px"><i class="fas fa-cart-shopping"></i><p>Cart is empty</p></div></div><div class="cart-footer"><div class="cart-total"><span>Subtotal</span><span id="cartSubtotal">${money(0)}</span></div><div class="cart-total"><span>Discount</span><span id="cartDiscount">${money(0)}</span></div><div class="cart-total grand"><span>Total</span><span id="cartTotal">${money(0)}</span></div><button class="btn btn-success" style="width:100%;margin-top:14px" id="checkoutBtn" data-role-write="1" disabled><i class="fas fa-credit-card"></i> Checkout</button></div></div></div>`;
  renderPOSGrid();
  $('posSearch').addEventListener('input',renderPOSGrid);
  $('posCatFilter').addEventListener('change',renderPOSGrid);
  $('checkoutBtn').addEventListener('click',openCheckoutModal);
  // show sticky bar on mobile
  if(window.innerWidth<=768){$('stickyCheckoutBar').style.display='flex'}
}
function renderPOSGrid(){
  const q=($('posSearch')?$('posSearch').value:'').toLowerCase();const catF=$('posCatFilter')?$('posCatFilter').value:'';
  const grid=$('posGrid');if(!grid)return;
  const products=DB.products.filter(p=>{if(q&&!p.name.toLowerCase().includes(q))return false;if(catF&&p.catId!==catF)return false;return getTotalStock(p.id)>0});
  grid.innerHTML=products.map(p=>{const cat=getCat(p.catId);const brand=getBrand(p.brandId);const stock=getTotalStock(p.id);return`<div class="product-tile" data-pid="${p.id}"><div class="cat">${cat?cat.name:''}</div><div class="name">${p.name}</div><div class="brand">${brand?brand.name:''}</div><div class="price">${money(p.price)}</div><div class="stock">${stock} ${unitLabel(p)} in stock</div></div>`}).join('')||'<div class="empty-state"><i class="fas fa-box-open"></i><p>No products in stock</p></div>';
  grid.querySelectorAll('.product-tile').forEach(t=>t.addEventListener('click',()=>selectProductForCart(t.dataset.pid)));
}
function selectProductForCart(pId){
  const p=getProduct(pId);if(!p)return;
  const variants=getProductVariants(pId).filter(v=>getVariantStock(v)>0);
  if(variants.length===0){toast('Out of stock','error');return}
  if(variants.length===1){addVariantToCart(variants[0]);return}
  openModal('Select Variant — '+p.name,`<div style="display:flex;flex-direction:column;gap:8px">${variants.map(v=>`<div class="cart-item clickable pick-variant" data-vid="${v.id}" style="cursor:pointer;border:2px solid transparent;transition:all .2s"><div class="cart-item-info"><div class="cart-item-name">${variantLabel(v)}</div><div class="cart-item-variant">SKU: ${v.sku||'N/A'} · Stock: ${getVariantStock(v)} ${unitLabel(p)}</div></div><div class="cart-item-price">${money(v.price)}</div></div>`).join('')}</div>`,`<button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>`);
  setTimeout(()=>{document.querySelectorAll('.pick-variant').forEach(el=>el.addEventListener('click',()=>{const v=getVariant(el.dataset.vid);closeModal();if(v)addVariantToCart(v)}))},50);
}

// ── FIX 4: addVariantToCart — serial products now offer "with / without serial" ─
function addVariantToCart(v){
  const p=getProduct(v.productId);if(!p)return;
  if(p.type==='serialized'){
    const available=DB.serialized.filter(s=>s.variantId===v.id&&(s.status==='in_stock'||s.status==='available')&&!cart.some(ci=>ci.serialId===s.id));
    openModal('Add to Cart — '+p.name,`
      <div class="serial-choice">
        <div class="serial-choice-btn active" id="choiceWith" onclick="switchSerialChoice('with')"><i class="fas fa-barcode"></i>With Serial<br><small style="font-weight:400;color:inherit;opacity:.8">Track specific unit</small></div>
        <div class="serial-choice-btn" id="choiceWithout" onclick="switchSerialChoice('without')"><i class="fas fa-cart-plus"></i>Without Serial<br><small style="font-weight:400;color:inherit;opacity:.8">Quick add</small></div>
      </div>
      <div id="panelWith">
        ${available.length>0
          ?`<div style="font-size:12px;color:var(--tx2);margin-bottom:8px">${available.length} unit(s) available — tap to add:</div><div style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:8px">${available.map(s=>`<div class="cart-item clickable pick-serial" data-sid="${s.id}" style="cursor:pointer;border:2px solid transparent;transition:all .2s"><div class="cart-item-info"><div class="cart-item-name" style="font-family:monospace">${s.serial}</div></div><i class="fas fa-plus-circle" style="color:var(--ac);font-size:18px"></i></div>`).join('')}</div>`
          :`<div style="text-align:center;padding:20px;color:var(--tx3);border:1.5px dashed var(--bd);border-radius:var(--rs)"><i class="fas fa-barcode" style="font-size:24px;opacity:.4;display:block;margin-bottom:8px"></i>No serialized units in stock.<br>Add stock via Inventory → Stock In, or use <strong>Without Serial</strong>.</div>`
        }
      </div>
      <div id="panelWithout" style="display:none">
        <div style="background:var(--wn2);border:1px solid var(--wn);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--wn);margin-bottom:12px"><i class="fas fa-exclamation-triangle" style="margin-right:6px"></i>Item will be added without tracking a specific serial number.</div>
        <div class="form-group"><label>Quantity</label><input class="form-input" id="noSerQty" type="number" min="1" max="${getVariantStock(v)}" value="1" ${!getVariantStock(v)?'disabled':''}></div>
        ${getVariantStock(v)>0?`<button class="btn btn-warning" style="width:100%" onclick="addNoSerial('${v.id}')"><i class="fas fa-cart-plus"></i> Add to Cart</button>`:`<div style="text-align:center;color:var(--dn);font-size:13px">Out of stock</div>`}
      </div>
    `,`<button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>`);
    setTimeout(()=>{document.querySelectorAll('.pick-serial').forEach(el=>el.addEventListener('click',()=>{const s=DB.serialized.find(x=>x.id===el.dataset.sid);if(!s)return;cart.push({id:uid(),variantId:v.id,productName:p.name,variantDesc:variantLabel(v),price:v.price,qty:1,serialized:true,serialId:s.id,serialNum:s.serial,unit:unitLabel(p)});closeModal();renderCart();toast('Added: '+p.name,'success')}))},50);
  }else{
    const existing=cart.find(ci=>ci.variantId===v.id&&!ci.serialized);
    if(existing){if(existing.qty<getVariantStock(v)){existing.qty++;renderCart();toast('Quantity updated','success')}else toast('Max stock reached','error')}
    else{cart.push({id:uid(),variantId:v.id,productName:p.name,variantDesc:variantLabel(v),price:v.price,qty:1,serialized:false,unit:unitLabel(p)});renderCart();toast('Added: '+p.name,'success')}
  }
}
window.switchSerialChoice=function(mode){
  const cw=$('choiceWith');const cwt=$('choiceWithout');const pw=$('panelWith');const pwt=$('panelWithout');
  if(mode==='with'){cw.classList.add('active');cwt.classList.remove('active');pw.style.display='';pwt.style.display='none'}
  else{cwt.classList.add('active');cw.classList.remove('active');pwt.style.display='';pw.style.display='none'}
}
window.addNoSerial=function(vId){
  const v=getVariant(vId);if(!v)return;const p=getProduct(v.productId);if(!p)return;
  const qty=parseInt($('noSerQty')?$('noSerQty').value:1)||1;
  const inCart=cart.filter(ci=>ci.variantId===vId&&!ci.serialId).reduce((s,ci)=>s+ci.qty,0);
  if(qty>getVariantStock(v)-inCart){toast(`Only ${getVariantStock(v)-inCart} available`,'error');return}
  const ex=cart.find(ci=>ci.variantId===vId&&!ci.serialId);
  if(ex)ex.qty+=qty;else cart.push({id:uid(),variantId:vId,productName:p.name,variantDesc:variantLabel(v),price:v.price,qty,serialized:false,unit:unitLabel(p)});
  closeModal();renderCart();toast(`${qty} × ${p.name} added to cart`,'success');
}

function renderCart(){
  const items=$('cartItems');const btn=$('checkoutBtn');if(!items)return;
  if(cart.length===0){items.innerHTML='<div class="empty-state" style="padding:30px"><i class="fas fa-cart-shopping"></i><p>Cart is empty</p></div>';if(btn)btn.disabled=true}
  else{
    items.innerHTML=cart.map(ci=>`<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">${ci.productName}</div><div class="cart-item-variant">${ci.variantDesc}${ci.serialNum?' · S/N: '+ci.serialNum:''}</div></div>${!ci.serialized?`<div class="qty-control"><button class="qty-btn" data-cid="${ci.id}" data-act="dec">−</button><div class="qty-val">${ci.qty}</div><button class="qty-btn" data-cid="${ci.id}" data-act="inc">+</button></div>`:`<span class="badge badge-gray">×1</span>`}<div class="cart-item-price">${money(ci.price*ci.qty)}</div><button class="cart-item-remove" data-cid="${ci.id}"><i class="fas fa-xmark"></i></button></div>`).join('');
    if(btn)btn.disabled=false;
    items.querySelectorAll('.qty-btn').forEach(b=>b.addEventListener('click',()=>{const ci=cart.find(c=>c.id===b.dataset.cid);if(!ci)return;const v=getVariant(ci.variantId);if(b.dataset.act==='inc'){if(ci.qty<getVariantStock(v))ci.qty++;else toast('Max stock','error')}else{if(ci.qty>1)ci.qty--;else cart=cart.filter(c=>c.id!==ci.id)}renderCart()}));
    items.querySelectorAll('.cart-item-remove').forEach(b=>b.addEventListener('click',()=>{cart=cart.filter(c=>c.id!==b.dataset.cid);renderCart()}));
  }
  const subtotal=cart.reduce((s,ci)=>s+ci.price*ci.qty,0);
  if($('cartSubtotal'))$('cartSubtotal').textContent=money(subtotal);
  if($('cartDiscount'))$('cartDiscount').textContent=money(0);
  if($('cartTotal'))$('cartTotal').textContent=money(subtotal);
  if($('cartCount'))$('cartCount').textContent=cart.length;
  if($('stickyTotal'))$('stickyTotal').textContent=money(subtotal);
}
function checkout(){openCheckoutModal()}
function openCheckoutModal(){
  if(cart.length===0)return;
  const subtotal=cart.reduce((s,ci)=>s+ci.price*ci.qty,0);
  openModal('Checkout',`<div class="form-group"><label>Customer Name</label><input class="form-input" id="coCustomer" value="Walk-in Customer"></div><div class="form-row"><div class="form-group"><label>Discount (K)</label><input class="form-input" id="coDiscount" type="number" step="0.01" value="0"></div><div class="form-group"><label>Payment Method</label><select class="form-input" id="coPayment"><option value="cash">Cash</option><option value="card">Card</option><option value="transfer">Bank Transfer</option><option value="mobile">Mobile Money</option></select></div></div><div style="background:var(--bg);padding:16px;border-radius:var(--rs);margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px"><span>Subtotal</span><span>${money(subtotal)}</span></div><div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px"><span>Discount</span><span id="coDiscShow">-${money(0)}</span></div><div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;padding-top:8px;border-top:2px solid var(--bd)"><span>Total</span><span id="coTotalShow">${money(subtotal)}</span></div></div>`,`<button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-success btn-sm" id="coCompleteBtn"><i class="fas fa-check"></i> Complete Sale</button>`);
  setTimeout(()=>{const de=$('coDiscount');if(de)de.addEventListener('input',()=>{let d=parseFloat(de.value)||0;if(d<0)d=0;if(d>subtotal)d=subtotal;$('coDiscShow').textContent='-'+money(d);$('coTotalShow').textContent=money(subtotal-d)});$('coCompleteBtn').addEventListener('click',()=>completeSale(subtotal))},50);
}
async function completeSale(subtotal){
  let discount=parseFloat($('coDiscount')?$('coDiscount').value:0)||0;if(discount<0)discount=0;if(discount>subtotal)discount=subtotal;
  const total=subtotal-discount;const saleId=uid();const receipt=nextReceipt();
  const sale={id:saleId,receipt_no:receipt,cashier_id:currentUser.id,cashier_name:currentUser.name,customer_name:($('coCustomer')?$('coCustomer').value:'Walk-in Customer').trim()||'Walk-in Customer',items:cart.reduce((s,i)=>s+i.qty,0),total,total_amount:total,discount,payment_method:$('coPayment')?$('coPayment').value:'cash',date:now(),date_str:today(),business_id:currentUser.business_id||null};
  const saleItems=cart.map(ci=>({id:uid(),sale_id:saleId,variant_id:ci.variantId,product_name:ci.productName,variant_desc:ci.variantDesc,serialized:ci.serialized,serial_id:ci.serialId||null,serial_num:ci.serialNum||null,qty:ci.qty,price:ci.price,discount:0,subtotal:ci.price*ci.qty}));
  // Optimistic update
  const localSale={id:saleId,receiptNo:receipt,cashierId:currentUser.id,cashierName:currentUser.name,customerName:sale.customer_name,items:sale.items,totalAmount:total,discount,paymentMethod:sale.payment_method,date:sale.date,dateStr:sale.date_str};
  DB.sales.unshift(localSale);
  saleItems.forEach(si=>{DB.saleItems.push({...si,saleId:si.sale_id,variantId:si.variant_id,productName:si.product_name,variantDesc:si.variant_desc,serialId:si.serial_id,serialNum:si.serial_num});if(si.serialized&&si.serial_id){const s=DB.serialized.find(x=>x.id===si.serial_id);if(s)s.status='sold'}else{const v=getVariant(si.variant_id);if(v)v.qty=Math.max(0,(Number(v.qty)||0)-si.qty)}});
  cart=[];closeModal();showReceipt(localSale,saleItems);toast('Sale completed! '+receipt,'success');
  if(!navigator.onLine){
    try{await IDB.add({id:saleId,sale,items:saleItems})}catch(e){console.error('IDB save failed:',e)}
    toast('Saved offline — will sync when connected','info');return;
  }
  try{
    const{error:sE}=await supabaseClient.from('sales').insert([sale]);if(sE)throw sE;
    for(const si of saleItems){
      await supabaseClient.from('sale_items').insert([si]);
      if(si.serialized&&si.serial_id)await supabaseClient.from('serialized_items').update({status:'sold'}).eq('id',si.serial_id);
      else{
        // Fetch current quantity from database to avoid double-decrement
        const{data:currentVariant}=await supabaseClient.from('variants').select('qty').eq('id',si.variant_id).single();
        if(currentVariant){
          const newQty=Math.max(0,(Number(currentVariant.qty)||0)-si.qty);
          await supabaseClient.from('variants').update({qty:newQty}).eq('id',si.variant_id);
        }
      }
      await supabaseClient.from('stock_moves').insert([{id:uid(),type:'sale',variant_id:si.variant_id,qty:si.qty,ref:saleId,date:sale.date,user_id:currentUser.id,notes:'Sale '+receipt}]);
    }
    DB=await loadDB();
  }catch(err){
    console.error('Online save failed, queuing offline:',err);
    try{await IDB.add({id:saleId,sale,items:saleItems})}catch(e){console.error('IDB fallback failed:',e)}
    toast('Network issue — sale queued for sync','info');
  }
}
function showReceipt(sale,directItems){
  const items=directItems||DB.saleItems.filter(si=>si.saleId===sale.id||(si.sale_id&&si.sale_id===sale.id));
  openModal('Receipt — '+(sale.receiptNo||sale.receipt_no||''),`<div class="receipt"><div class="receipt-center"><strong style="font-size:16px">ORIGINATION STORES</strong><br><span style="font-size:10px">${new Date(sale.date).toLocaleString()}</span></div><hr><div class="receipt-row"><span>Receipt:</span><span>${sale.receiptNo||sale.receipt_no}</span></div><div class="receipt-row"><span>Cashier:</span><span>${sale.cashierName||sale.cashier_name}</span></div><div class="receipt-row"><span>Customer:</span><span>${sale.customerName||sale.customer_name}</span></div><div class="receipt-row"><span>Payment:</span><span style="text-transform:capitalize">${sale.paymentMethod||sale.payment_method}</span></div><hr>${items.map(i=>`<div style="margin-bottom:6px"><div style="font-weight:700">${i.productName||i.product_name}</div>${(i.serialNum||i.serial_num)?`<div style="font-size:10px;color:#666">S/N: ${i.serialNum||i.serial_num}</div>`:''}<div class="receipt-row"><span>${i.qty} × ${money(i.price)}</span><span>${money(i.qty*i.price)}</span></div></div>`).join('')}<hr><div class="receipt-row"><span>Subtotal:</span><span>${money((sale.totalAmount||sale.total_amount||sale.total||0)+(sale.discount||0))}</span></div>${(sale.discount||0)>0?`<div class="receipt-row"><span>Discount:</span><span>-${money(sale.discount)}</span></div>`:''}<div class="receipt-row" style="font-weight:700;font-size:14px"><span>TOTAL:</span><span>${money(sale.totalAmount||sale.total_amount||sale.total||0)}</span></div><hr><div class="receipt-center" style="font-size:11px;color:#666">Thank you for shopping!<br>Origination Stores</div></div>`,`<button class="btn btn-primary btn-sm" onclick="window.print()"><i class="fas fa-print"></i> Print</button><button class="btn btn-outline btn-sm" onclick="closeModal();if(currentPage==='sales'){cart=[];renderSales()}">Close</button>`);
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportToExcel(sales){
  if(!sales||sales.length===0){toast('No data to export','error');return}
  const XLSX=window.XLSX;
  const rows=sales.map(s=>({'Receipt No':s.receiptNo||s.receipt_no||'','Date':s.dateStr||s.date_str||'','Cashier':s.cashierName||s.cashier_name||'','Customer':s.customerName||s.customer_name||'','Items':s.items||0,'Total Amount':Number(s.totalAmount||s.total_amount||s.total||0),'Payment Method':s.paymentMethod||s.payment_method||''}));
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Sales');XLSX.writeFile(wb,`sales-export-${today()}.xlsx`);
}
function exportToPDF(sales){
  if(!sales||sales.length===0){toast('No data to export','error');return}
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape'});
  const total=sales.reduce((s,r)=>s+Number(r.totalAmount||r.total_amount||r.total||0),0);
  doc.setFontSize(16);doc.setFont(undefined,'bold');doc.text('Origination Stores',14,18);
  doc.setFontSize(10);doc.setFont(undefined,'normal');doc.text(`Sales Report — ${today()}`,14,26);doc.text(`Total: K${Number(total).toFixed(2)}`,14,33);
  const cols=['Receipt No','Date','Cashier','Customer','Items','Total Amount','Payment'];const colWidths=[32,26,40,40,16,34,28];let x=14,y=44;
  doc.setFillColor(212,175,55);doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont(undefined,'bold');
  let cx=x;cols.forEach((col,i)=>{doc.rect(cx,y-5,colWidths[i],8,'F');doc.text(col,cx+2,y);cx+=colWidths[i]});
  doc.setTextColor(0,0,0);doc.setFont(undefined,'normal');y+=10;
  sales.forEach((s,idx)=>{if(y>185){doc.addPage();y=20}if(idx%2===0){doc.setFillColor(242,242,247);let rx=x;colWidths.forEach(w=>{doc.rect(rx,y-5,w,8,'F');rx+=w})}const row=[(s.receiptNo||s.receipt_no||''),(s.dateStr||s.date_str||''),(s.cashierName||s.cashier_name||''),(s.customerName||s.customer_name||''),String(s.items||0),'K'+Number(s.totalAmount||s.total_amount||s.total||0).toFixed(2),(s.paymentMethod||s.payment_method||'')];let rx=x;row.forEach((val,i)=>{doc.text(String(val).slice(0,18),rx+2,y);rx+=colWidths[i]});y+=9});
  doc.save(`sales-report-${today()}.pdf`);
}

// ── Sales History ─────────────────────────────────────────────────────────────
function renderHistory(){
  renderTopbarActions(`<button class="btn btn-outline btn-sm" id="exportExcelBtn" data-role-min="manager"><i class="fas fa-file-excel"></i> Excel</button><button class="btn btn-outline btn-sm" id="exportPdfBtn" data-role-min="manager"><i class="fas fa-file-pdf"></i> PDF</button>`);
  $('mainContent').innerHTML=`<div class="fade-in"><div class="search-bar"><div class="form-group" style="margin:0"><label style="font-size:11px;margin-bottom:4px">Date</label><input type="date" class="form-input" id="histDate" value="${today()}" style="padding:8px 12px"></div><div class="search-wrap"><i class="fas fa-search"></i><input class="search-input" id="histSearch" placeholder="Search by receipt or customer..."></div><select class="filter-select" id="histTypeFilter"><option value="all">All Transactions</option><option value="sales">Regular Sales</option><option value="tradeins">Trade-Ins</option></select></div><div id="histStats" style="margin-bottom:16px"></div><div class="card"><div class="card-body np"><div class="table-wrap"><table><thead><tr><th>Receipt</th><th>Type</th><th>Time</th><th>Customer</th><th>Items</th><th>Amount</th><th>Payment</th><th>Cashier</th><th></th></tr></thead><tbody id="histBody"></tbody></table></div></div></div></div>`;
  renderHistTable();
  $('histDate').addEventListener('change',renderHistTable);$('histSearch').addEventListener('input',renderHistTable);$('histTypeFilter').addEventListener('change',renderHistTable);
  if($('exportExcelBtn'))$('exportExcelBtn').addEventListener('click',()=>{const s=getFilteredSales();exportToExcel(s)});
  if($('exportPdfBtn'))$('exportPdfBtn').addEventListener('click',()=>{const s=getFilteredSales();exportToPDF(s)});
  if(currentUser)applyRoleGuards(currentUser.role);
}
function getFilteredSales(){
  const date=$('histDate')?$('histDate').value:today();const q=($('histSearch')?$('histSearch').value:'').toLowerCase();
  return DB.sales.filter(s=>{const sd=s.dateStr||s.date_str||(s.date?s.date.slice(0,10):'');if(sd!==date)return false;if(q&&!(s.receiptNo||'').toLowerCase().includes(q)&&!(s.customerName||'').toLowerCase().includes(q))return false;return true});
}
function getFilteredTradeIns(){
  const date=$('histDate')?$('histDate').value:today();const q=($('histSearch')?$('histSearch').value:'').toLowerCase();
  return DB.tradeIns.filter(t=>{const td=t.dateStr||t.date_str||(t.date?t.date.slice(0,10):'');if(td!==date)return false;if(q&&!(t.receiptNo||t.receipt_no||'').toLowerCase().includes(q)&&!(t.customerName||t.customer_name||'').toLowerCase().includes(q))return false;return true});
}
function renderHistTable(){
  const typeFilter=$('histTypeFilter')?$('histTypeFilter').value:'all';
  const sales=typeFilter==='tradeins'?[]:getFilteredSales();
  const tradeins=typeFilter==='sales'?[]:getFilteredTradeIns();
  const totalRev=sales.reduce((s,sl)=>s+(sl.totalAmount||sl.total||0),0)+tradeins.reduce((s,t)=>s+(t.netPayment||t.net_payment||0),0);
  const totalTrans=sales.length+tradeins.length;
  const totalItems=sales.reduce((s,sl)=>s+(sl.items||0),0)+tradeins.length;
  const hs=$('histStats');if(hs)hs.innerHTML=`<div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))"><div class="stat-card"><div class="stat-icon blue"><i class="fas fa-coins"></i></div><div class="stat-value">${money(totalRev)}</div><div class="stat-label">Revenue</div></div><div class="stat-card"><div class="stat-icon green"><i class="fas fa-boxes-stacked"></i></div><div class="stat-value">${totalTrans}</div><div class="stat-label">Transactions</div></div><div class="stat-card"><div class="stat-icon orange"><i class="fas fa-receipt"></i></div><div class="stat-value">${totalItems}</div><div class="stat-label">Items Sold</div></div></div>`;
  const tbody=$('histBody');if(!tbody)return;
  const salesRows=sales.map(s=>`<tr><td><span class="badge badge-blue">${s.receiptNo||s.receipt_no}</span></td><td><span class="badge badge-gray">Sale</span></td><td>${new Date(s.date).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}</td><td>${s.customerName||s.customer_name}</td><td>${s.items||0}</td><td style="font-weight:700">${money(s.totalAmount||s.total_amount||s.total)}</td><td style="text-transform:capitalize">${s.paymentMethod||s.payment_method}</td><td>${s.cashierName||s.cashier_name}</td><td style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm" onclick="showReceipt(DB.sales.find(sl=>sl.id==='${s.id}'))"><i class="fas fa-eye"></i></button>${currentUser.role==='admin'?`<button class="btn btn-ghost btn-sm" onclick="deleteSale('${s.id}')" style="color:var(--dn)"><i class="fas fa-trash"></i></button>`:''}</td></tr>`);
  const tradeinRows=tradeins.map(t=>`<tr><td><span class="badge badge-blue">${t.receiptNo||t.receipt_no}</span></td><td><span class="badge badge-orange" style="background:var(--ac3);color:var(--ac)">Trade-In</span></td><td>${new Date(t.date||t.created_at).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}</td><td>${t.customerName||t.customer_name}</td><td>1</td><td style="font-weight:700">${money(t.netPayment||t.net_payment)}</td><td style="text-transform:capitalize">Cash</td><td>${t.cashierName||t.cashier_name}</td><td style="display:flex;gap:4px"><button class="btn btn-ghost btn-sm" onclick="viewTradeinReceipt('${t.id}')"><i class="fas fa-eye"></i></button></td></tr>`);
  const allRows=[...salesRows,...tradeinRows];
  tbody.innerHTML=allRows.join('')||`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--tx3)">No transactions found for this date</td></tr>`;
}

// ── Suppliers ─────────────────────────────────────────────────────────────────
function renderSuppliers(){
  renderTopbarActions(`<button class="btn btn-primary btn-sm" id="addSuppBtn"><i class="fas fa-plus"></i> Add Supplier</button>`);
  $('mainContent').innerHTML=`<div class="fade-in"><div class="card"><div class="card-header"><h3>Suppliers</h3></div><div class="card-body np"><div class="table-wrap"><table><thead><tr><th>Name</th><th>Contact</th><th>Email</th><th>Notes</th></tr></thead><tbody>${DB.suppliers.map(s=>`<tr><td style="font-weight:600">${s.name}</td><td>${s.contact||'—'}</td><td>${s.email||'—'}</td><td style="font-size:12px;color:var(--tx2)">${s.notes||''}</td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--tx3)">No suppliers yet</td></tr>'}</tbody></table></div></div></div></div>`;
  $('addSuppBtn').addEventListener('click',()=>{openModal('Add Supplier',`<div class="form-row"><div class="form-group"><label>Name</label><input class="form-input" id="mSuppName"></div><div class="form-group"><label>Contact</label><input class="form-input" id="mSuppContact"></div></div><div class="form-row"><div class="form-group"><label>Email</label><input class="form-input" id="mSuppEmail"></div><div class="form-group"><label>Notes</label><input class="form-input" id="mSuppNotes"></div></div>`,`<button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" id="saveSuppBtn">Add Supplier</button>`);setTimeout(()=>{$('saveSuppBtn').addEventListener('click',async()=>{const name=($('mSuppName')?$('mSuppName').value:'').trim();if(!name){toast('Name required','error');return}const{error}=await supabaseClient.from('suppliers').insert([{id:uid(),name,contact:$('mSuppContact').value.trim(),email:$('mSuppEmail').value.trim(),notes:$('mSuppNotes').value.trim()}]);if(error){toast('Failed to add supplier','error');return}DB=await loadDB();closeModal();renderSuppliers();toast('Supplier added','success')})},50)});
}

// ── Reports ───────────────────────────────────────────────────────────────────
function renderReports(){
  $('mainContent').innerHTML=`<div class="fade-in"><div class="stats-grid"><div class="stat-card"><div class="stat-icon blue"><i class="fas fa-boxes-stacked"></i></div><div class="stat-value">${DB.products.length}</div><div class="stat-label">Total Products</div></div><div class="stat-card"><div class="stat-icon green"><i class="fas fa-receipt"></i></div><div class="stat-value">${DB.sales.length}</div><div class="stat-label">Total Sales</div></div><div class="stat-card"><div class="stat-icon orange"><i class="fas fa-money-bill"></i></div><div class="stat-value">${money(DB.sales.reduce((s,sl)=>s+(sl.totalAmount||sl.total||0),0))}</div><div class="stat-label">Total Revenue</div></div><div class="stat-card"><div class="stat-icon red"><i class="fas fa-users"></i></div><div class="stat-value">${DB.users.length}</div><div class="stat-label">Staff Members</div></div></div><div class="card"><div class="card-header"><h3>Inventory Value Report</h3><button class="btn btn-outline btn-sm" onclick="exportToExcel(DB.sales)"><i class="fas fa-file-excel"></i> Export All Sales</button></div><div class="card-body np"><div class="table-wrap"><table><thead><tr><th>Product</th><th>Stock</th><th>Cost</th><th>Inventory Value</th><th>Sell Price</th><th>Potential Revenue</th></tr></thead><tbody>${DB.products.map(p=>{const s=getTotalStock(p.id);return`<tr><td style="font-weight:600">${p.name}</td><td>${s}</td><td>${money(p.cost||0)}</td><td style="font-weight:600">${money(s*(p.cost||0))}</td><td>${money(p.price||0)}</td><td style="color:var(--gn);font-weight:700">${money(s*(p.price||0))}</td></tr>`}).join('')||'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--tx3)">No products</td></tr>'}</tbody></table></div></div></div></div>`;
}

// ── Users ─────────────────────────────────────────────────────────────────────
function renderUsers(){
  renderTopbarActions(`<button class="btn btn-primary btn-sm" id="addUserBtn"><i class="fas fa-plus"></i> Add User</button>`);
  $('mainContent').innerHTML=`<div class="fade-in"><div class="card"><div class="card-header"><h3>System Users</h3></div><div class="card-body np"><div class="table-wrap"><table><thead><tr><th>Name</th><th>Role</th><th>Status</th></tr></thead><tbody>${DB.users.map(u=>`<tr><td style="font-weight:600">${u.name}</td><td style="text-transform:capitalize">${u.role}</td><td><span class="badge ${u.active?'badge-green':'badge-red'}">${u.active?'Active':'Inactive'}</span></td></tr>`).join('')||'<tr><td colspan="3" style="text-align:center;padding:40px;color:var(--tx3)">No users found</td></tr>'}</tbody></table></div></div></div></div>`;
  $('addUserBtn').addEventListener('click',()=>openModal('Add User',`<div class="form-row"><div class="form-group"><label>Full Name</label><input class="form-input" id="mUName"></div><div class="form-group"><label>Role</label><select class="form-input" id="mURole"><option value="admin">Admin</option><option value="manager">Manager</option><option value="cashier">Cashier</option><option value="storekeeper">Storekeeper</option></select></div></div><p style="font-size:12px;color:var(--tx2);margin-top:8px">To create a new user login, go to Supabase → Authentication → Add User, then create a profile record with this business_id: <code style="font-size:11px;background:var(--bg);padding:2px 6px;border-radius:4px">${currentUser.business_id||'your-business-id'}</code></p>`,`<button class="btn btn-outline btn-sm" onclick="closeModal()">Close</button>`));
}

// ── Staff Manager ─────────────────────────────────────────────────────────────
async function renderStaffManager(){
  if(currentUser.role!=='admin'){$('mainContent').innerHTML=`<div class="empty-state"><i class="fas fa-lock"></i><h3>Access Denied</h3><p>Only admins can manage staff.</p></div>`;return}
  $('mainContent').innerHTML=`<div class="fade-in"><div class="card" style="margin-bottom:20px"><div class="card-header"><h3><i class="fas fa-user-plus" style="margin-right:8px;color:var(--ac)"></i>Invite Staff Member</h3></div><div class="card-body"><p style="font-size:13px;color:var(--tx2);margin-bottom:16px">To add staff, create their account in Supabase Auth Dashboard then insert a profile record.</p><div style="background:var(--bg);padding:14px;border-radius:var(--rs);font-family:monospace;font-size:12px;line-height:1.8;color:var(--tx2)">INSERT INTO profiles (id, full_name, role, business_id, plan, onboarding_completed)<br>VALUES ('USER_UUID', 'Staff Name', 'cashier', '${currentUser.business_id||'BUSINESS_ID'}', 'free', true);</div></div></div><div class="card"><div class="card-header"><h3><i class="fas fa-users" style="margin-right:8px;color:var(--ac)"></i>Current Staff</h3></div><div class="card-body np"><div class="table-wrap"><table><thead><tr><th>Name</th><th>Role</th><th>Plan</th></tr></thead><tbody id="staffBody"><tr><td colspan="3" style="text-align:center;padding:20px;color:var(--tx3)"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr></tbody></table></div></div></div></div>`;
  const{data:staff}=await supabaseClient.from('profiles').select('id,full_name,role,plan').eq('business_id',currentUser.business_id||'');
  const tbody=$('staffBody');if(!tbody)return;
  const rc={admin:'badge-orange',manager:'badge-blue',cashier:'badge-green',storekeeper:'badge-gray'};
  tbody.innerHTML=(staff||[]).map(s=>`<tr><td style="font-weight:600">${s.full_name||'—'}</td><td><span class="badge ${rc[s.role]||'badge-gray'}">${s.role}</span></td><td><span class="badge badge-gray">${s.plan||'free'}</span></td></tr>`).join('')||'<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--tx3)">No staff found</td></tr>';
}

// ── Low Stock Monitor ─────────────────────────────────────────────────────────
let _lowStockIntervalId=null,_prevLowStockIds=new Set();
function renderNotificationBanner(items){
  const banner=$('lowStockBanner');if(!banner)return;
  if(!items||items.length===0){banner.style.display='none';banner.innerHTML='';return}
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  banner.innerHTML=`<i class="fas fa-triangle-exclamation" style="margin-right:8px"></i>Low Stock: ${items.map(i=>`<strong>${esc(i.product_name)}</strong> (${i.qty} left)`).join(' &nbsp;·&nbsp; ')}`;
  banner.style.display='block';
}
async function checkLowStock(){
  try{
    let q=supabaseClient.from('variants').select('id,product_id,qty').lt('qty',5);
    if(currentUser&&currentUser.business_id)q=q.eq('business_id',currentUser.business_id);
    const{data,error}=await q;if(error)throw error;
    const items=(data||[]).map(v=>{const p=getProduct(v.product_id);return{id:v.id,product_name:p?p.name:null,qty:v.qty}}).filter(i=>i.product_name);
    renderNotificationBanner(items);
    const cur=new Set(items.map(i=>i.id));_prevLowStockIds=cur;
  }catch(err){console.error('Low stock check failed:',err)}
}
function startLowStockMonitor(){if(_lowStockIntervalId)return;checkLowStock();_lowStockIntervalId=setInterval(checkLowStock,30000)}
function stopLowStockMonitor(){if(_lowStockIntervalId){clearInterval(_lowStockIntervalId);_lowStockIntervalId=null}}

// ── Barcode Scanner (from _inject.js) ────────────────────────────────────────
var _scannerRunning=false;
function openBarcodeScanner(){if(!window.Quagga){toast('Scanner not available','error');return}openModal('Scan Barcode',`<div id="scannerContainer" style="position:relative;width:100%;max-width:400px;margin:0 auto"><div id="interactive" class="viewport" style="width:100%;height:280px;overflow:hidden;border-radius:var(--rs);background:#000"></div><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;height:2px;background:rgba(212,175,55,.7);pointer-events:none"></div><p style="text-align:center;color:var(--tx2);font-size:13px;margin-top:12px">Point camera at a product barcode</p></div>`,`<button class="btn btn-outline btn-sm" onclick="stopBarcodeScanner();closeModal()">Cancel</button>`);setTimeout(()=>{Quagga.init({inputStream:{type:'LiveStream',target:document.querySelector('#interactive'),constraints:{facingMode:'environment'}},decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader']}},err=>{if(err){toast('Camera access denied','error');closeModal();return}Quagga.start();_scannerRunning=true});Quagga.onDetected(result=>{const code=result.codeResult.code;stopBarcodeScanner();closeModal();handleScannedBarcode(code)})},300)}
function stopBarcodeScanner(){if(_scannerRunning&&window.Quagga){Quagga.stop();_scannerRunning=false}}
function handleScannedBarcode(code){const variant=DB.variants.find(v=>v.sku===code);if(!variant){toast('Product not found for barcode: '+code,'error');return}const product=getProduct(variant.productId||variant.product_id);if(!product){toast('Product data missing','error');return}if(currentPage==='sales'){addToCart(variant,product);toast('Added: '+product.name,'success')}else{navigate('sales');setTimeout(()=>{addVariantToCart(variant);toast('Added: '+product.name,'success')},400)}}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function logout(){stopLowStockMonitor();await supabaseClient.auth.signOut();window.location.replace('login.html')}

// ── Onboarding ────────────────────────────────────────────────────────────────
function showOnboarding(){
  $('appShell').classList.remove('active');
  openModal('Welcome to Origination-Inventory 👋',`<div style="text-align:center;margin-bottom:20px"><div style="font-size:48px">🏪</div><p style="color:var(--tx2);font-size:14px;margin-top:8px">Let's set up your store quickly</p></div><div class="form-group"><label>Business / Shop Name</label><input class="form-input" id="obBizName" placeholder="e.g. Chanda's Grocery"></div><div class="form-group"><label>Your Role</label><select class="form-input" id="obRole"><option value="admin">Owner / Admin</option><option value="manager">Manager</option></select></div>`,`<button class="btn btn-primary" id="obBtn"><i class="fas fa-arrow-right"></i> Let's Go</button>`);
  $('modalClose').style.display='none';
  setTimeout(()=>{$('obBtn').addEventListener('click',async()=>{const bizName=($('obBizName')?$('obBizName').value:'').trim();if(!bizName){toast('Enter your business name','error');return}$('obBtn').disabled=true;await supabaseClient.from('profiles').update({onboarding_completed:true,role:$('obRole').value}).eq('id',currentUser.id);await supabaseClient.auth.updateUser({data:{business_name:bizName}});currentUser.onboarding_completed=true;$('modalClose').style.display='';closeModal();$('appShell').classList.add('active');toast('Welcome to Origination-Inventory! 🎉','success');renderSidebar();navigate('dashboard')})},50);
}

// ── Start App ─────────────────────────────────────────────────────────────────
async function startApp(){
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  if(new URLSearchParams(window.location.search).get('signup'))setTimeout(()=>{},400);
  try{const loaded=await loadDB();if(loaded)DB=loaded}catch(e){console.error('DB load error:',e)}
  syncOfflineQueue();
  const restored=await restoreSession();
  if(restored){
    if(['admin','manager'].includes(currentUser.role))startLowStockMonitor();
    if(!currentUser.onboarding_completed)showOnboarding();
    return;
  }
  $('loginBtn').addEventListener('click',async()=>{
    const email=($('loginUser')?$('loginUser').value:'').trim();const password=($('loginPass')?$('loginPass').value:'').trim();
    if(!email||!password){$('loginError').textContent='Enter email and password';$('loginError').style.display='block';return}
    $('loginBtn').disabled=true;$('loginBtn').innerHTML='<i class="fas fa-spinner fa-spin"></i> Signing in...';
    const result=await signInWithRealAuth(email,password);
    if(result.ok){
      $('loginScreen').classList.add('hidden');$('appShell').classList.add('active');
      renderSidebar();navigate('dashboard');
      if(['admin','manager'].includes(currentUser.role))startLowStockMonitor();
    }else{
      $('loginError').textContent='Invalid email or password';$('loginError').style.display='block';
      setTimeout(()=>{if($('loginError'))$('loginError').style.display='none'},3000);
      $('loginBtn').disabled=false;$('loginBtn').innerHTML='<i class="fas fa-arrow-right"></i> Sign In';
    }
  });
  $('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')$('loginBtn').click()});
  $('menuToggle').addEventListener('click',()=>{$('sidebar').classList.add('open');$('sidebarBackdrop').classList.add('active')});
  $('sidebarBackdrop').addEventListener('click',closeSidebar);
}
startApp();
</script>
